name: Apply maintenance hardening batch

on:
  push:
    branches:
      - agent/maintenance-hardening-batch
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-maintenance-hardening
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout hardening branch
        uses: actions/checkout@v4
        with:
          ref: agent/maintenance-hardening-batch
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply focused code transformations
        run: |
          set +e
          node scripts/apply-maintenance-hardening-batch.mjs > hardening-codemod-report.txt 2>&1
          code=$?
          echo "Exit code: $code" >> hardening-codemod-report.txt
          cat hardening-codemod-report.txt
          exit 0

      - name: Commit transformed files and diagnostics
        run: |
          git config user.name "Vorta Hardening Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No codemod changes to commit"
          else
            git commit -m "Apply maintenance hardening codemod diagnostics"
            git push origin HEAD:agent/maintenance-hardening-batch
          fi
