name: Integrate equipment history timeline

on:
  push:
    branches: [main]
    paths:
      - .github/history-integration-trigger

permissions:
  contents: write

jobs:
  integrate-history:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Integrate timeline into the History page
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          history_path = Path("src/screens/Equipment/EquipmentHistory.tsx")
          text = history_path.read_text()

          text = text.replace("  BarChart3,\n", "", 1)

          navigation_import = 'import { EquipmentTabNavigation } from "./EquipmentTabNavigation";\n'
          timeline_import = 'import { EquipmentHistoryTimeline } from "./EquipmentHistoryTimeline";\n'
          if timeline_import not in text:
              if navigation_import not in text:
                  raise SystemExit("EquipmentTabNavigation import marker not found")
              text = text.replace(
                  navigation_import,
                  navigation_import + timeline_import,
                  1,
              )

          text, count = re.subn(
              r'\nfunction monthKey\(date: Date\): string \{\n  return `\$\{date\.getFullYear\(\)\}-\$\{String\(date\.getMonth\(\) \+ 1\)\.padStart\(2, "0"\)\}`;\n\}\n',
              '\n',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit(f"Expected to remove monthKey once, removed {count}")

          series_pattern = re.compile(
              r'  const monthlySeries = useMemo\(\(\) => \{.*?  const filteredRows = useMemo\(\(\) => \{',
              re.S,
          )
          text, count = series_pattern.subn(
              '  const filteredRows = useMemo(() => {',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit(f"Expected to remove legacy chart calculations once, replaced {count}")

          chart_pattern = re.compile(
              r'''          <Card className="rounded-2xl border border-gray-800 bg-\[#141820\] shadow-none">\n            <CardContent className="p-5 md:p-6">\n              <div className="flex flex-wrap items-start justify-between gap-3">\n                <div>\n                  <div className="flex items-center gap-2">\n                    <BarChart3.*?          </Card>\n\n          <Card className="rounded-2xl border border-gray-800 bg-\[#141820\] shadow-none">''',
              re.S,
          )
          chart_replacement = '''          <Card className="rounded-2xl border border-gray-800 bg-[#141820] shadow-none">
            <CardContent className="p-5 md:p-6">
              <EquipmentHistoryTimeline
                equipmentId={equipment.id}
                rows={historyRows}
                range={range}
                onRangeChange={setRange}
                loading={loading}
                onOpenWorkOrder={openWorkOrder}
              />
            </CardContent>
          </Card>

          <Card className="rounded-2xl border border-gray-800 bg-[#141820] shadow-none">'''
          text, count = chart_pattern.subn(chart_replacement, text, count=1)
          if count != 1:
              raise SystemExit(f"Expected to replace legacy chart once, replaced {count}")

          history_path.write_text(text)

          index_path = Path("src/screens/Equipment/index.ts")
          index_text = index_path.read_text()
          old_export = 'export { EquipmentHistoryWithAggregatedEventTimeline as EquipmentHistory } from "./EquipmentHistoryWithAggregatedEventTimeline";'
          new_export = 'export { EquipmentHistory } from "./EquipmentHistory";'
          if old_export not in index_text:
              raise SystemExit("Aggregated History export marker not found")
          index_path.write_text(index_text.replace(old_export, new_export, 1))

          for obsolete in [
              Path("src/screens/Equipment/EquipmentHistoryWithEventTimeline.tsx"),
              Path("src/screens/Equipment/EquipmentHistoryWithAggregatedEventTimeline.tsx"),
          ]:
              if obsolete.exists():
                  obsolete.unlink()

          Path(".github/history-integration-trigger").unlink(missing_ok=True)
          Path(".github/workflows/integrate-equipment-history-timeline.yml").unlink(missing_ok=True)
          PY

      - name: Install dependencies
        run: npm ci

      - name: Build production application
        run: npm run build

      - name: Commit integrated History page
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Integrate equipment history timeline"
          git push origin main
