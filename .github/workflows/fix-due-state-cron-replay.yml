name: Fix due-state cron replay

on:
  push:
    branches:
      - agent/fix-due-state-cron-replay
    paths:
      - scripts/fix-due-state-cron-replay.mjs
      - .github/workflows/fix-due-state-cron-replay.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-due-state-cron-replay

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Correct migration replay
        run: node scripts/fix-due-state-cron-replay.mjs

      - name: Remove one-time scaffolding
        run: |
          rm scripts/fix-due-state-cron-replay.mjs
          rm .github/workflows/fix-due-state-cron-replay.yml

      - name: Commit replay-safe migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations/20260719230000_enforce_continuous_due_state_truth.sql scripts/fix-due-state-cron-replay.mjs .github/workflows/fix-due-state-cron-replay.yml
          git commit -m "Make due-state cron migration replay-safe"
          git push origin HEAD:agent/fix-due-state-cron-replay
