name: Apply database workforce photos

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-database-workforce-photos.yml

# Trigger after the workflow is registered on main.
permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Connect workforce portraits to Supabase records
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}: {old[:140]!r}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          service = "src/screens/Equipment/equipmentService.ts"
          replace_once(
              service,
              '''export interface EquipmentEngineerCapability {
  capabilityId: string; engineerId: string; engineerName: string;
  discipline: string | null; shiftPattern: string | null;''',
              '''export interface EquipmentEngineerCapability {
  capabilityId: string; engineerId: string; engineerName: string; avatarUrl: string | null;
  discipline: string | null; shiftPattern: string | null;''',
          )
          replace_once(
              service,
              '''export interface EquipmentOperatorCapability {
  assignmentId: string; operatorId: string; operatorName: string;
  shiftName: string | null; roleOnEquipment: string | null; amStep: number | null;''',
              '''export interface EquipmentOperatorCapability {
  assignmentId: string; operatorId: string; operatorName: string; avatarUrl: string | null;
  shiftName: string | null; roleOnEquipment: string | null; amStep: number | null;''',
          )
          replace_once(
              service,
              '''    engineerName: engineer.engineer_name ?? "Unknown engineer", discipline: engineer.discipline ?? null,
    shiftPattern: engineer.shift_pattern ?? null, availabilityStatus: engineer.availability_status ?? null,''',
              '''    engineerName: engineer.engineer_name ?? "Unknown engineer", avatarUrl: engineer.avatar_url ?? null,
    discipline: engineer.discipline ?? null, shiftPattern: engineer.shift_pattern ?? null,
    availabilityStatus: engineer.availability_status ?? null,''',
          )
          replace_once(
              service,
              '''    operatorName: operator.operator_name ?? "Unknown operator", shiftName: operator.shift_name ?? null,
    roleOnEquipment: operator.role_on_equipment ?? null,''',
              '''    operatorName: operator.operator_name ?? "Unknown operator", avatarUrl: operator.avatar_url ?? null,
    shiftName: operator.shift_name ?? null, roleOnEquipment: operator.role_on_equipment ?? null,''',
          )

          skills = "src/screens/Equipment/EquipmentSkills.tsx"
          replace_once(
              skills,
              '''import { Card, CardContent } from "../../components/ui/card";

import { EquipmentBase, DEFAULT_EQUIPMENT_ID } from "./equipmentData";''',
              '''import { Card, CardContent } from "../../components/ui/card";
import { ProfilePhoto } from "../../components/ProfilePhoto";

import { EquipmentBase, DEFAULT_EQUIPMENT_ID } from "./equipmentData";''',
          )
          replace_once(
              skills,
              '''function SkillStatus({ skill }: { skill: EquipmentRequiredSkill }) {''',
              '''function PrimarySmeCard({ engineer }: { engineer?: EquipmentEngineerCapability }) {
  const name = engineer?.engineerName ?? "Unassigned";
  return (
    <Card className="rounded-xl border border-gray-800 bg-[#141820] shadow-none">
      <CardContent className="p-4">
        <p className="text-[10px] font-semibold uppercase tracking-[0.14em] text-slate-500">Primary SME</p>
        <div className="mt-2 flex min-w-0 items-center gap-3">
          <ProfilePhoto
            name={name}
            photoUrl={engineer?.avatarUrl}
            sizeClass="h-14 w-14"
            shapeClass="rounded-xl"
            fallbackClass={engineer ? "bg-emerald-500/15 text-emerald-300" : "bg-red-500/15 text-red-300"}
            className="text-sm"
            eager
          />
          <div className="min-w-0">
            <p className={`truncate text-xl font-bold ${engineer ? "text-emerald-300" : "text-red-300"}`}>{name}</p>
            <p className="mt-1 text-xs text-slate-500">
              {engineer ? `${engineer.requiredSkillMatches}/${engineer.requiredSkillTotal} skills matched` : "Critical ownership gap"}
            </p>
          </div>
        </div>
      </CardContent>
    </Card>
  );
}

function SkillStatus({ skill }: { skill: EquipmentRequiredSkill }) {''',
          )
          replace_once(
              skills,
              '''      <div className="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-blue-500/15 text-xs font-bold text-blue-300">{initials(engineer.engineerName)}</div>''',
              '''      <ProfilePhoto
        name={engineer.engineerName}
        photoUrl={engineer.avatarUrl}
        sizeClass="h-9 w-9"
        shapeClass="rounded-full"
        fallbackClass="bg-blue-500/15 text-blue-300"
        fallbackText={initials(engineer.engineerName)}
        className="text-xs"
      />''',
          )
          replace_once(
              skills,
              '''        <div className="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-violet-500/15 text-[10px] font-bold text-violet-300">{initials(operator.operatorName)}</div>''',
              '''        <ProfilePhoto
          name={operator.operatorName}
          photoUrl={operator.avatarUrl}
          sizeClass="h-8 w-8"
          shapeClass="rounded-full"
          fallbackClass="bg-violet-500/15 text-violet-300"
          fallbackText={initials(operator.operatorName)}
          className="text-[10px]"
        />''',
          )
          replace_once(
              skills,
              '''              <StatCard label="Primary SME" value={primarySme?.engineerName ?? "Unassigned"} detail={primarySme ? `${primarySme.requiredSkillMatches}/${primarySme.requiredSkillTotal} skills matched` : "Critical ownership gap"} tone={primarySme ? "text-emerald-300" : "text-red-300"} />''',
              '''              <PrimarySmeCard engineer={primarySme} />''',
          )

          engineers = "src/screens/Engineers/EngineersSection.tsx"
          replace_once(
              engineers,
              '''import { ExplainWithAi } from "../../components/ExplainWithAi";
import { ShiftCalendar, ShiftEvent } from "../../components/ShiftCalendar";''',
              '''import { ExplainWithAi } from "../../components/ExplainWithAi";
import { ProfilePhoto } from "../../components/ProfilePhoto";
import { ShiftCalendar, ShiftEvent } from "../../components/ShiftCalendar";''',
          )
          replace_once(
              engineers,
              '''        <div className={`flex h-10 w-10 shrink-0 items-center justify-center rounded-xl text-sm font-bold ${getAvatarColor(eng.full_name)}`}>
          {getInitials(eng.full_name)}
        </div>''',
              '''        <ProfilePhoto
          name={eng.full_name}
          photoUrl={eng.avatar_url}
          sizeClass="h-10 w-10"
          shapeClass="rounded-xl"
          fallbackClass={getAvatarColor(eng.full_name)}
          fallbackText={getInitials(eng.full_name)}
          className="text-sm"
        />''',
          )
          replace_once(
              engineers,
              '''                                   <div className={`flex h-7 w-7 shrink-0 items-center justify-center rounded-lg text-[10px] font-bold ${getAvatarColor(eng.full_name)}`}>
                                     {getInitials(eng.full_name)}
                                   </div>''',
              '''                                   <ProfilePhoto
                                     name={eng.full_name}
                                     photoUrl={eng.avatar_url}
                                     sizeClass="h-7 w-7"
                                     shapeClass="rounded-lg"
                                     fallbackClass={getAvatarColor(eng.full_name)}
                                     fallbackText={getInitials(eng.full_name)}
                                     className="text-[10px]"
                                   />''',
          )
          replace_once(
              engineers,
              '''                           <div className={`flex h-7 w-7 shrink-0 items-center justify-center rounded-lg text-[10px] font-bold ${getAvatarColor(eng.full_name)}`}>
                             {getInitials(eng.full_name)}
                           </div>''',
              '''                           <ProfilePhoto
                             name={eng.full_name}
                             photoUrl={eng.avatar_url}
                             sizeClass="h-7 w-7"
                             shapeClass="rounded-lg"
                             fallbackClass={getAvatarColor(eng.full_name)}
                             fallbackText={getInitials(eng.full_name)}
                             className="text-[10px]"
                           />''',
          )

          drawer = "src/screens/Engineers/EngineerDrawer.tsx"
          replace_once(
              drawer,
              '''import { DetailDrawer, DrawerCloseButton } from "../../components/DetailDrawer";''',
              '''import { DetailDrawer, DrawerCloseButton } from "../../components/DetailDrawer";
import { ProfilePhoto } from "../../components/ProfilePhoto";''',
          )
          replace_once(
              drawer,
              '''  id: string;
  full_name: string;
  discipline: string | null;''',
              '''  id: string;
  full_name: string;
  avatar_url: string | null;
  discipline: string | null;''',
          )
          replace_once(
              drawer,
              '''          <div className={`flex h-16 w-16 shrink-0 items-center justify-center rounded-2xl text-xl font-bold ${getAvatarColor(engineer.full_name)}`}>
            {getInitials(engineer.full_name)}
          </div>''',
              '''          <ProfilePhoto
            name={engineer.full_name}
            photoUrl={engineer.avatar_url}
            sizeClass="h-16 w-16"
            shapeClass="rounded-2xl"
            fallbackClass={getAvatarColor(engineer.full_name)}
            fallbackText={getInitials(engineer.full_name)}
            className="text-xl"
            eager
          />''',
          )

          edge = "supabase/functions/engineers-data/index.ts"
          replace_once(
              edge,
              '''      .select("id,full_name,employment_type,discipline,availability_status,verified,shift_pattern,department_id,site_id")''',
              '''      .select("id,full_name,avatar_url,employment_type,discipline,availability_status,verified,shift_pattern,department_id,site_id")''',
          )
          replace_once(
              edge,
              '''    id: string; full_name: string; employment_type: string; discipline: string | null;
    availability_status: string; verified: boolean; shift_pattern: string | null;''',
              '''    id: string; full_name: string; avatar_url: string | null; employment_type: string; discipline: string | null;
    availability_status: string; verified: boolean; shift_pattern: string | null;''',
          )
          PY

      - name: Install dependencies
        run: npm install

      - name: Verify production build
        run: npm run build

      - name: Commit focused workforce photo integration
        shell: bash
        run: |
          rm .github/workflows/apply-database-workforce-photos.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/screens/Equipment/equipmentService.ts src/screens/Equipment/EquipmentSkills.tsx src/screens/Engineers/EngineersSection.tsx src/screens/Engineers/EngineerDrawer.tsx supabase/functions/engineers-data/index.ts .github/workflows/apply-database-workforce-photos.yml
          git commit -m "Connect workforce profile photos across equipment and engineers"
          git push origin HEAD:main
