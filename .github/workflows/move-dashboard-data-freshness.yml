name: Move dashboard data freshness

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/move-dashboard-data-freshness.yml

# One-time workflow registered before this trigger commit.
permissions:
  contents: write

jobs:
  patch-dashboard:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Move freshness metadata beside scope tabs
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path("src/screens/AiOperations/sections/DashboardOverviewSection/DashboardOverviewSection.tsx")
          text = path.read_text(encoding="utf-8")

          replacements = [
              (
                  '            <div className="overflow-x-auto border-b border-gray-800 pb-4">',
                  '            <div className="flex flex-col gap-3 border-b border-gray-800 pb-4 xl:flex-row xl:items-center xl:justify-between">',
              ),
              (
                  '                className="flex min-w-max items-center gap-2"',
                  '                className="flex min-w-0 flex-1 items-center gap-2 overflow-x-auto [scrollbar-width:none] [&::-webkit-scrollbar]:hidden"',
              ),
              (
                  '                        className={`inline-flex h-9 items-center gap-2 rounded-lg border px-3 text-xs font-semibold transition-colors ${',
                  '                        className={`inline-flex h-9 shrink-0 items-center gap-2 rounded-lg border px-3 text-xs font-semibold transition-colors ${',
              ),
              (
                  '''              </div>
            </div>

            {/* Card header */}''',
                  '''              </div>

              <div
                aria-label="Data freshness"
                className="flex shrink-0 items-center gap-2 text-left xl:text-right"
              >
                <RefreshCw
                  className="h-3.5 w-3.5 text-slate-500"
                  aria-hidden="true"
                />

                <div className="flex flex-col gap-0.5">
                  <p className="text-xs text-slate-400">
                    Latest data refresh · 2h ago
                  </p>

                  <p className="text-[11px] text-slate-500">
                    SAP · Skills · Training
                  </p>
                </div>
              </div>
            </div>

            {/* Card header */}''',
              ),
              (
                  '            <header className="grid gap-4 lg:grid-cols-[minmax(180px,0.55fr)_minmax(360px,1.45fr)_auto] lg:items-end">',
                  '            <header className="grid gap-4 lg:grid-cols-[minmax(180px,0.55fr)_minmax(360px,1.45fr)] lg:items-end">',
              ),
              (
                  '''
              <div className="flex flex-col gap-0.5 text-left lg:items-end lg:text-right">
                <p className="text-xs text-slate-400">
                  Based on latest import
                </p>

                <p className="text-xs text-slate-500">
                  SAP / Skills / Training data refreshed 2h ago
                </p>
              </div>''',
                  '',
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected exactly one match, found {count}: {old[:100]!r}")
              text = text.replace(old, new, 1)

          path.write_text(text, encoding="utf-8")
          PY

      - name: Install dependencies
        run: npm install

      - name: Verify build
        run: npm run build

      - name: Commit focused layout change
        shell: bash
        run: |
          rm .github/workflows/move-dashboard-data-freshness.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/screens/AiOperations/sections/DashboardOverviewSection/DashboardOverviewSection.tsx .github/workflows/move-dashboard-data-freshness.yml
          git commit -m "Move dashboard data freshness beside scope tabs"
          git push origin HEAD:main
