name: Apply equipment skills profile photos

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-equipment-skills-profile-photos.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Add database profile photos to equipment skills
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path("src/screens/Equipment/EquipmentSkills.tsx")
          text = path.read_text(encoding="utf-8")

          replacements = [
            (
              'import { Card, CardContent } from "../../components/ui/card";\n\nimport { EquipmentBase, DEFAULT_EQUIPMENT_ID } from "./equipmentData";',
              'import { Card, CardContent } from "../../components/ui/card";\nimport { ProfilePhoto } from "../../components/ProfilePhoto";\n\nimport { EquipmentBase, DEFAULT_EQUIPMENT_ID } from "./equipmentData";',
            ),
            (
              'function SkillStatus({ skill }: { skill: EquipmentRequiredSkill }) {',
              '''function PrimarySmeCard({ engineer }: { engineer?: EquipmentEngineerCapability }) {
  const name = engineer?.engineerName ?? "Unassigned";
  return (
    <Card className="rounded-xl border border-gray-800 bg-[#141820] shadow-none">
      <CardContent className="p-4">
        <p className="text-[10px] font-semibold uppercase tracking-[0.14em] text-slate-500">Primary SME</p>
        <div className="mt-2 flex min-w-0 items-center gap-3">
          <ProfilePhoto
            name={name}
            entityType="engineer"
            entityId={engineer?.engineerId}
            sizeClass="h-14 w-14"
            shapeClass="rounded-xl"
            fallbackClass={engineer ? "bg-emerald-500/15 text-emerald-300" : "bg-red-500/15 text-red-300"}
            className="text-sm"
            eager
          />
          <div className="min-w-0">
            <p className={`truncate text-xl font-bold ${engineer ? "text-emerald-300" : "text-red-300"}`}>{name}</p>
            <p className="mt-1 text-xs text-slate-500">
              {engineer ? `${engineer.requiredSkillMatches}/${engineer.requiredSkillTotal} skills matched` : "Critical ownership gap"}
            </p>
          </div>
        </div>
      </CardContent>
    </Card>
  );
}

function SkillStatus({ skill }: { skill: EquipmentRequiredSkill }) {''',
            ),
            (
              '      <div className="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-blue-500/15 text-xs font-bold text-blue-300">{initials(engineer.engineerName)}</div>',
              '''      <ProfilePhoto
        name={engineer.engineerName}
        entityType="engineer"
        entityId={engineer.engineerId}
        sizeClass="h-9 w-9"
        shapeClass="rounded-full"
        fallbackClass="bg-blue-500/15 text-blue-300"
        fallbackText={initials(engineer.engineerName)}
        className="text-xs"
      />''',
            ),
            (
              '        <div className="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-violet-500/15 text-[10px] font-bold text-violet-300">{initials(operator.operatorName)}</div>',
              '''        <ProfilePhoto
          name={operator.operatorName}
          entityType="operator"
          entityId={operator.operatorId}
          sizeClass="h-8 w-8"
          shapeClass="rounded-full"
          fallbackClass="bg-violet-500/15 text-violet-300"
          fallbackText={initials(operator.operatorName)}
          className="text-[10px]"
        />''',
            ),
            (
              '              <StatCard label="Primary SME" value={primarySme?.engineerName ?? "Unassigned"} detail={primarySme ? `${primarySme.requiredSkillMatches}/${primarySme.requiredSkillTotal} skills matched` : "Critical ownership gap"} tone={primarySme ? "text-emerald-300" : "text-red-300"} />',
              '              <PrimarySmeCard engineer={primarySme} />',
            ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected one match, found {count}: {old[:120]!r}")
              text = text.replace(old, new, 1)

          path.write_text(text, encoding="utf-8")
          PY

      - name: Install dependencies
        run: npm install

      - name: Verify production build
        run: npm run build

      - name: Commit focused equipment skills change
        shell: bash
        run: |
          rm .github/workflows/apply-equipment-skills-profile-photos.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/screens/Equipment/EquipmentSkills.tsx .github/workflows/apply-equipment-skills-profile-photos.yml
          git commit -m "Show database profile photos in equipment capability"
          git push origin HEAD:main
