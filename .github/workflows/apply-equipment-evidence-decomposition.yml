name: Apply Equipment evidence decomposition

on:
  push:
    branches:
      - agent/equipment-evidence-decomposition

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[equipment-decomposition]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/equipment-evidence-decomposition
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Apply focused module extraction
        run: node scripts/apply-equipment-evidence-decomposition.mjs

      - name: Verify TypeScript and contracts
        run: |
          npm run typecheck -- --pretty false
          npm run test:contracts
          npm run test:smoke

      - name: Commit decomposition
        shell: bash
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No decomposition changes were required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/screens/Equipment \
            scripts/post-audit-p0-contracts.mjs \
            scripts/equipment-module-boundary-contracts.mjs \
            docs/equipment-evidence-module-boundaries.md \
            package.json
          git commit -m "Split Equipment pilot evidence modules [equipment-decomposition]"
          git push origin HEAD:agent/equipment-evidence-decomposition
