name: Dashboard scope cache

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "scripts/set-based-dashboard-scope-contracts.mjs"
      - ".github/workflows/set-based-dashboard-scopes.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scope-cache-contracts:
    name: Dashboard scope cache contracts
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify dashboard scope cache contracts
        run: node scripts/set-based-dashboard-scope-contracts.mjs
