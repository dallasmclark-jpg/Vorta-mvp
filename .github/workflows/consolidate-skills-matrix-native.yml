name: Consolidate Skills Matrix natively

on:
  push:
    paths:
      - .github/workflows/consolidate-skills-matrix-native.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  consolidate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Consolidate Skills Matrix into one native component
        shell: python
        run: |
          from pathlib import Path

          page_path = Path("src/screens/SkillsMatrix/SkillsMatrixSection.tsx")
          text = page_path.read_text()

          text = text.replace(
              '  useMemo,\n  useRef,\n  useState,',
              '  useMemo,\n  useState,',
              1,
          )
          text = text.replace(
              'const SKILLS_MATRIX_OPTIONS = { body: { schemaVersion: "capability-v3" } };\n',
              'const SKILLS_MATRIX_OPTIONS = { body: { schemaVersion: "capability-v3" } };\nconst ALL_SITE = "All Site";\n',
              1,
          )
          text = text.replace(
              '  CALIBRATION: "border-t-amber-400",',
              '  CALIBRATION: "border-t-violet-400",',
              1,
          )

          tone_marker = '''const TEAM_ICONS: Record<string, ElementType> = {
  OVERALL: Layers3,
  RED: Users,
  GREEN: Users,
  BLUE: Users,
  YELLOW: Users,
  DAYS: Users,
  CALIBRATION: Gauge,
  OT: Cpu,
};
'''
          tone_block = tone_marker + '''
const TEAM_SELECTED_CLASSES: Record<string, string> = {
  OVERALL: "border-x-blue-400/70 border-b-blue-400/70 bg-blue-500/[0.06] ring-blue-400/20",
  RED: "border-x-red-500/70 border-b-red-500/70 bg-red-500/[0.06] ring-red-500/20",
  GREEN: "border-x-emerald-500/70 border-b-emerald-500/70 bg-emerald-500/[0.06] ring-emerald-500/20",
  BLUE: "border-x-blue-500/70 border-b-blue-500/70 bg-blue-500/[0.06] ring-blue-500/20",
  YELLOW: "border-x-yellow-400/70 border-b-yellow-400/70 bg-yellow-400/[0.055] ring-yellow-400/20",
  DAYS: "border-x-slate-300/60 border-b-slate-300/60 bg-slate-300/[0.045] ring-slate-300/15",
  CALIBRATION: "border-x-violet-400/70 border-b-violet-400/70 bg-violet-500/[0.065] ring-violet-400/20",
  OT: "border-x-cyan-400/70 border-b-cyan-400/70 bg-cyan-500/[0.055] ring-cyan-400/20",
};

const TEAM_PANEL_CLASSES: Record<string, string> = {
  OVERALL: "border-t-blue-400 bg-gradient-to-r from-blue-500/[0.08] to-[#141820]",
  RED: "border-t-red-500 bg-gradient-to-r from-red-500/[0.08] to-[#141820]",
  GREEN: "border-t-emerald-500 bg-gradient-to-r from-emerald-500/[0.08] to-[#141820]",
  BLUE: "border-t-blue-500 bg-gradient-to-r from-blue-500/[0.08] to-[#141820]",
  YELLOW: "border-t-yellow-400 bg-gradient-to-r from-yellow-400/[0.08] to-[#141820]",
  DAYS: "border-t-slate-300 bg-gradient-to-r from-slate-300/[0.06] to-[#141820]",
  CALIBRATION: "border-t-violet-400 bg-gradient-to-r from-violet-500/[0.09] to-[#141820]",
  OT: "border-t-cyan-400 bg-gradient-to-r from-cyan-500/[0.08] to-[#141820]",
};

const TEAM_TEXT_CLASSES: Record<string, string> = {
  OVERALL: "text-blue-300",
  RED: "text-red-400",
  GREEN: "text-emerald-400",
  BLUE: "text-blue-400",
  YELLOW: "text-yellow-300",
  DAYS: "text-slate-200",
  CALIBRATION: "text-violet-300",
  OT: "text-cyan-300",
};
'''
          if tone_marker not in text:
              raise SystemExit("Team icon marker not found")
          text = text.replace(tone_marker, tone_block, 1)

          helper_marker = '''function abbreviate(value: string): string {
  const map: Record<string, string> = {
'''
          helper_block = '''function siteWideLabel(siteName: string): string {
  const baseName = siteName.replace(/\\s+Sterile Fill-Finish$/i, "").trim();
  return `${baseName || siteName} · Site-wide Maintenance`;
}

function engineerInitials(name: string): string {
  return name
    .split(" ")
    .map((part) => part[0])
    .filter(Boolean)
    .slice(0, 2)
    .join("");
}

''' + helper_marker
          if helper_marker not in text:
              raise SystemExit("Helper marker not found")
          text = text.replace(helper_marker, helper_block, 1)

          old_selected = '''  const Icon = TEAM_ICONS[scope.code] ?? Users;
  const accent = TEAM_ACCENTS[scope.code] ?? "border-t-slate-500";
'''
          new_selected = '''  const Icon = TEAM_ICONS[scope.code] ?? Users;
  const accent = TEAM_ACCENTS[scope.code] ?? "border-t-slate-500";
  const selectedClass =
    TEAM_SELECTED_CLASSES[scope.code] ?? TEAM_SELECTED_CLASSES.OVERALL;
'''
          text = text.replace(old_selected, new_selected, 1)
          text = text.replace(
              '''        selected
          ? "border-x-blue-500/50 border-b-blue-500/50 ring-1 ring-blue-500/20"
          : "border-x-gray-800 border-b-gray-800 hover:border-x-gray-700 hover:border-b-gray-700 hover:bg-[#171c25]"
''',
              '''        selected
          ? `${selectedClass} ring-1`
          : "border-x-gray-800 border-b-gray-800 hover:border-x-gray-700 hover:border-b-gray-700 hover:bg-[#171c25]"
''',
              1,
          )

          text = text.replace(
              '  const detailRef = useRef<HTMLDivElement>(null);\n',
              '',
              1,
          )
          state_marker = '''  const [selectedSkillId, setSelectedSkillId] = useState<string | null>(null);
'''
          state_block = state_marker + '''  const [selectedArea, setSelectedArea] = useState(ALL_SITE);
  const [showAllWeaknesses, setShowAllWeaknesses] = useState(false);
  const [avatarUrls, setAvatarUrls] = useState<Map<string, string>>(new Map());
  const [buildingSkills, setBuildingSkills] = useState<Map<string, Set<string>>>(new Map());
'''
          text = text.replace(state_marker, state_block, 1)

          load_effect_marker = '''  useEffect(() => {
    void loadData(false);
  }, [loadData]);
'''
          effects_block = load_effect_marker + '''
  useEffect(() => {
    let active = true;
    void supabase
      .from("engineers")
      .select("id,full_name,avatar_url")
      .then(({ data: rows, error: avatarError }) => {
        if (!active || avatarError) return;
        const next = new Map<string, string>();
        for (const row of rows ?? []) {
          if (typeof row.avatar_url !== "string" || row.avatar_url.length === 0) continue;
          next.set(String(row.id), row.avatar_url);
          if (typeof row.full_name === "string") next.set(row.full_name, row.avatar_url);
        }
        setAvatarUrls(next);
      });
    return () => {
      active = false;
    };
  }, []);

  useEffect(() => {
    const siteId = data?.site.id;
    if (!siteId) return;
    let active = true;

    void (async () => {
      const { data: equipmentRows, error: equipmentError } = await supabase
        .from("equipment_assets")
        .select("id,area")
        .eq("site_id", siteId)
        .order("area");
      if (!active || equipmentError || !equipmentRows?.length) return;

      const equipmentIds = equipmentRows.map((row) => row.id);
      const { data: requirementRows, error: requirementError } = await supabase
        .from("equipment_required_skills")
        .select("equipment_id,skill_id")
        .in("equipment_id", equipmentIds);
      if (!active || requirementError) return;

      const areaByEquipment = new Map(
        equipmentRows.map((row) => [String(row.id), String(row.area ?? "Unassigned")]),
      );
      const next = new Map<string, Set<string>>();
      for (const row of requirementRows ?? []) {
        const area = areaByEquipment.get(String(row.equipment_id));
        if (!area || !row.skill_id) continue;
        const skills = next.get(area) ?? new Set<string>();
        skills.add(String(row.skill_id));
        next.set(area, skills);
      }
      setBuildingSkills(next);
    })();

    return () => {
      active = false;
    };
  }, [data?.site.id]);
'''
          text = text.replace(load_effect_marker, effects_block, 1)

          text = text.replace(
              '''  useEffect(() => {
    setSearch("");
    setPriorityOnly(false);
    setSelectedSkillId(null);
  }, [selectedScopeId]);
''',
              '''  useEffect(() => {
    setSearch("");
    setPriorityOnly(false);
    setSelectedSkillId(null);
    setSelectedArea(ALL_SITE);
    setShowAllWeaknesses(false);
  }, [selectedScopeId]);
''',
              1,
          )

          old_filter = '''  const filteredMatrixSkills = useMemo(() => {
    if (!selectedDetail) return [];
    const term = search.trim().toLowerCase();
    const skillMatches = selectedDetail.matrixSkills.filter((skill) =>
      skill.name.toLowerCase().includes(term) || skill.category.toLowerCase().includes(term),
    );
    let skills = priorityOnly
      ? selectedDetail.matrixSkills.filter((skill) => prioritySkillIds.has(skill.id))
      : selectedDetail.matrixSkills;
    if (term && skillMatches.length > 0) {
      skills = skills.filter((skill) => skillMatches.some((match) => match.id === skill.id));
    }
    return skills;
  }, [priorityOnly, prioritySkillIds, search, selectedDetail]);
'''
          new_filter = '''  const areaTabs = useMemo(() => {
    const skills = selectedDetail?.matrixSkills ?? [];
    return [
      { name: ALL_SITE, count: skills.length },
      ...Array.from(buildingSkills.entries())
        .map(([name, skillIds]) => ({
          name,
          count: skills.filter((skill) => skillIds.has(skill.id)).length,
        }))
        .sort((left, right) => left.name.localeCompare(right.name)),
    ];
  }, [buildingSkills, selectedDetail]);

  const filteredMatrixSkills = useMemo(() => {
    if (!selectedDetail) return [];
    const term = search.trim().toLowerCase();
    const skillMatches = selectedDetail.matrixSkills.filter((skill) =>
      skill.name.toLowerCase().includes(term) || skill.category.toLowerCase().includes(term),
    );
    const areaSkillIds =
      selectedArea === ALL_SITE ? null : buildingSkills.get(selectedArea) ?? new Set<string>();
    let skills = selectedDetail.matrixSkills.filter(
      (skill) => !areaSkillIds || areaSkillIds.has(skill.id),
    );
    if (priorityOnly) {
      skills = skills.filter((skill) => prioritySkillIds.has(skill.id));
    }
    if (term && skillMatches.length > 0) {
      skills = skills.filter((skill) => skillMatches.some((match) => match.id === skill.id));
    }
    return skills;
  }, [buildingSkills, priorityOnly, prioritySkillIds, search, selectedArea, selectedDetail]);
'''
          if old_filter not in text:
              raise SystemExit("Matrix filter block not found")
          text = text.replace(old_filter, new_filter, 1)

          selected_skill_marker = '''  const selectedSkill = useMemo(
    () => selectedDetail?.matrixSkills.find((skill) => skill.id === selectedSkillId) ?? null,
    [selectedDetail, selectedSkillId],
  );
'''
          intelligence_block = selected_skill_marker + '''
  const capabilityIntelligence = useMemo(() => {
    if (!selectedSummary || !selectedDetail) return null;
    const risks = selectedDetail.priorityRisks;
    const topRisk = risks[0] ?? null;
    return {
      topRisk,
      priorityCount: risks.length,
      assetCount:
        new Set(risks.map((risk) => risk.equipmentId)).size || selectedSummary.affectedEquipment,
      singlePointCount: risks.filter((risk) => risk.singlePoint).length,
    };
  }, [selectedDetail, selectedSummary]);

  const visiblePriorityRisks = useMemo(
    () =>
      showAllWeaknesses
        ? selectedDetail?.priorityRisks ?? []
        : selectedDetail?.priorityRisks.slice(0, 3) ?? [],
    [selectedDetail, showAllWeaknesses],
  );

  const selectedPanelClass =
    TEAM_PANEL_CLASSES[selectedSummary?.code ?? "OVERALL"] ?? TEAM_PANEL_CLASSES.OVERALL;
  const selectedTextClass =
    TEAM_TEXT_CLASSES[selectedSummary?.code ?? "OVERALL"] ?? TEAM_TEXT_CLASSES.OVERALL;
'''
          text = text.replace(selected_skill_marker, intelligence_block, 1)

          text = text.replace(
              '''  const handleScopeSelect = (scopeId: string): void => {
    setSelectedScopeId(scopeId);
    window.requestAnimationFrame(() => {
      detailRef.current?.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  };
''',
              '''  const handleScopeSelect = (scopeId: string): void => {
    setSelectedScopeId(scopeId);
  };
''',
              1,
          )

          text = text.replace(
              '{data?.site.name ?? "Maintenance site"}',
              '{data ? siteWideLabel(data.site.name) : "Maintenance site"}',
              1,
          )

          text = text.replace(
              '''          <div className="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
            <div className="inline-flex w-fit rounded-lg border border-gray-800 bg-[#0f1318] p-1">''',
              '''          <div className="flex flex-col gap-3 sm:flex-row sm:items-center">
            <div className="inline-flex w-fit rounded-lg border border-gray-800 bg-[#0f1318] p-1">''',
              1,
          )
          explanatory = '''            <p className="text-xs text-slate-500">
              {viewMode === "team"
                ? "Shift teams plus Calibration and Operational Technology"
                : "Permanent capability grouped by organisational department"}
            </p>
'''
          text = text.replace(explanatory, '', 1)

          start_marker = '            <div ref={detailRef} className="scroll-mt-4 flex min-w-0 w-full flex-col gap-6">'
          matrix_marker = '              <Card className="min-w-0 w-full rounded-xl border border-gray-800 bg-[#141820] shadow-none">'
          start = text.find(start_marker)
          matrix = text.find(matrix_marker, start)
          if start < 0 or matrix < 0:
              raise SystemExit("Selected detail region markers not found")

          native_detail = '''            <div className="flex min-w-0 w-full flex-col gap-6">
              <Card className={`w-full rounded-xl border border-t-2 border-x-gray-800 border-b-gray-800 shadow-none ${selectedPanelClass}`}>
                <CardContent className="p-5 lg:p-6">
                  <div className="flex flex-col gap-5 lg:flex-row lg:items-start lg:justify-between">
                    <div className="min-w-0 max-w-4xl">
                      <div className="flex flex-wrap items-center gap-2">
                        <Badge className={`h-auto rounded border border-current/30 bg-black/10 px-2 py-1 text-[10px] font-semibold uppercase tracking-[0.16em] shadow-none ${selectedTextClass}`}>
                          Capability intelligence
                        </Badge>
                        <Badge className={`h-auto rounded border px-2 py-1 text-[10px] font-semibold shadow-none ${statusBadgeClass(selectedSummary.status)}`}>
                          {selectedSummary.status}
                        </Badge>
                      </div>
                      <h2 className="mt-3 text-lg font-semibold text-slate-50">
                        {selectedSummary.name.replace(/\\s+Capability$/i, "")} Briefing
                      </h2>
                      <p className="mt-2 text-sm leading-6 text-slate-300">
                        {capabilityIntelligence?.topRisk
                          ? `${selectedSummary.name.replace(/\\s+Capability$/i, "")} is ${selectedSummary.status.toLowerCase()} at ${selectedSummary.score}/100. ${capabilityIntelligence.priorityCount} priority coverage ${capabilityIntelligence.priorityCount === 1 ? "record affects" : "records affect"} ${capabilityIntelligence.assetCount} ${capabilityIntelligence.assetCount === 1 ? "asset" : "assets"}, including ${capabilityIntelligence.singlePointCount} single-person ${capabilityIntelligence.singlePointCount === 1 ? "dependency" : "dependencies"}. The highest-ranked exposure is ${capabilityIntelligence.topRisk.skillName} on ${capabilityIntelligence.topRisk.equipmentName}.`
                          : `${selectedSummary.name.replace(/\\s+Capability$/i, "")} has no priority coverage exception in the current site dataset. The score is calculated from current critical-skill coverage, experience depth, SME resilience and validation evidence.`}
                      </p>
                      {capabilityIntelligence?.topRisk ? (
                        <p className="mt-2 text-xs leading-5 text-slate-500">
                          <span className="font-semibold text-slate-400">Recorded action:</span>{" "}
                          {capabilityIntelligence.topRisk.recommendedAction}
                        </p>
                      ) : null}
                    </div>
                    <div className="shrink-0 text-left lg:text-right">
                      <p className="text-[10px] font-semibold uppercase tracking-[0.14em] text-slate-500">
                        Live capability score
                      </p>
                      <div className="mt-1 flex items-end gap-1 lg:justify-end">
                        <span className={`text-3xl font-semibold tabular-nums ${selectedTextClass}`}>
                          {selectedSummary.score}
                        </span>
                        <span className="pb-1 text-xs text-slate-600">/ 100</span>
                      </div>
                    </div>
                  </div>

                  <div className="mt-5 grid grid-cols-1 gap-3 border-t border-white/10 pt-4 sm:grid-cols-2 xl:grid-cols-4">
                    {[
                      { label: "Highest-risk capability", value: capabilityIntelligence?.topRisk?.skillName ?? "No current exception" },
                      {
                        label: "Coverage status",
                        value: capabilityIntelligence?.topRisk
                          ? capabilityIntelligence.topRisk.qualifiedCount >= capabilityIntelligence.topRisk.minimumRequired && capabilityIntelligence.topRisk.singlePoint
                            ? `${capabilityIntelligence.topRisk.qualifiedCount}/${capabilityIntelligence.topRisk.minimumRequired} · resilience risk`
                            : `${capabilityIntelligence.topRisk.qualifiedCount}/${capabilityIntelligence.topRisk.minimumRequired}`
                          : "Covered",
                      },
                      { label: "Assets affected", value: String(capabilityIntelligence?.assetCount ?? 0) },
                      {
                        label: "Recorded action gain",
                        value: capabilityIntelligence?.topRisk ? `+${capabilityIntelligence.topRisk.projectedScoreGain} pts` : "No action required",
                      },
                    ].map((metric) => (
                      <div key={metric.label} className="min-w-0 rounded-lg border border-white/10 bg-black/10 px-4 py-3">
                        <p className="text-[10px] font-medium uppercase tracking-[0.1em] text-slate-500">{metric.label}</p>
                        <p className="mt-1 truncate text-sm font-semibold text-slate-100" title={metric.value}>{metric.value}</p>
                      </div>
                    ))}
                  </div>
                </CardContent>
              </Card>

              <div className="grid w-full grid-cols-1 gap-6 xl:grid-cols-[minmax(300px,0.75fr)_minmax(0,1.55fr)]">
                <Card className="min-w-0 self-start rounded-xl border border-gray-800 bg-[#141820] shadow-none">
                  <CardContent className="flex min-w-0 flex-col gap-4 p-5">
                    <div>
                      <h3 className="font-semibold text-slate-50">People &amp; Experience</h3>
                      <p className="mt-1 text-sm text-slate-400">Permanent members of the selected scope</p>
                    </div>
                    <div className="grid grid-cols-3 gap-2 border-y border-gray-800 py-3">
                      <div className="rounded-lg bg-[#10151d] px-3 py-2">
                        <p className="text-[10px] text-slate-500">Avg experience</p>
                        <p className="mt-1 text-sm font-semibold text-slate-200">{average(selectedDetail.engineers.map((engineer) => engineer.averageYearsExperience)).toFixed(1)} yrs</p>
                      </div>
                      <div className="rounded-lg bg-[#10151d] px-3 py-2">
                        <p className="text-[10px] text-slate-500">Critical SMEs</p>
                        <p className="mt-1 text-sm font-semibold text-blue-300">{selectedDetail.engineers.filter((engineer) => engineer.criticalKnowledgeHolder).length}</p>
                      </div>
                      <div className="rounded-lg bg-[#10151d] px-3 py-2">
                        <p className="text-[10px] text-slate-500">Training needs</p>
                        <p className="mt-1 text-sm font-semibold text-amber-300">{selectedDetail.engineers.reduce((sum, engineer) => sum + engineer.trainingNeeds, 0)}</p>
                      </div>
                    </div>
                    <div className="skills-matrix-people-scroll flex max-h-[560px] flex-col divide-y divide-gray-800/70 overflow-y-auto pr-1">
                      {selectedDetail.engineers.map((engineer) => {
                        const avatarUrl = avatarUrls.get(engineer.id) ?? avatarUrls.get(engineer.name);
                        return (
                          <div key={engineer.id} className="flex items-center gap-3 py-3">
                            <div className="relative flex h-10 w-10 shrink-0 items-center justify-center overflow-hidden rounded-full border border-gray-700 bg-[#0f1318] text-sm font-semibold text-slate-300">
                              {avatarUrl ? <img src={avatarUrl} alt={`${engineer.name} profile`} loading="lazy" className="h-full w-full object-cover" /> : engineerInitials(engineer.name)}
                            </div>
                            <div className="min-w-0 flex-1">
                              <div className="flex flex-wrap items-center gap-1.5">
                                <p className="truncate text-sm font-medium text-slate-200">{engineer.name}</p>
                                {engineer.criticalKnowledgeHolder ? <Shield className="h-3.5 w-3.5 text-blue-400" aria-label="Critical knowledge holder" /> : null}
                              </div>
                              <p className="truncate text-[11px] text-slate-500">{engineer.discipline}</p>
                              <p className="truncate text-[10px] text-slate-600">{engineer.shiftNames.join(" · ") || engineer.departmentName || "Specialist team"}</p>
                            </div>
                            <div className="shrink-0 text-right">
                              <p className="text-xs font-semibold tabular-nums text-slate-300">{engineer.averageYearsExperience.toFixed(1)} yrs</p>
                              <p className={engineer.trainingNeeds > 0 ? "text-[10px] text-orange-300" : "text-[10px] text-slate-600"}>{engineer.trainingNeeds} training need{engineer.trainingNeeds === 1 ? "" : "s"}</p>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </CardContent>
                </Card>

                <Card className="min-w-0 rounded-xl border border-gray-800 bg-[#141820] shadow-none">
                  <CardContent className="flex min-w-0 flex-col gap-4 p-5">
                    <div className="flex items-center justify-between gap-3">
                      <div>
                        <h3 className="font-semibold text-slate-50">Priority Coverage Weaknesses</h3>
                        <p className="mt-1 text-sm text-slate-400">Ranked by equipment criticality, coverage deficit and SME dependency</p>
                      </div>
                      <Badge className="h-auto rounded border border-red-500/20 bg-red-500/10 px-2 py-1 text-[10px] text-red-400 shadow-none">{capabilityIntelligence?.assetCount ?? selectedSummary.affectedEquipment} assets affected</Badge>
                    </div>
                    {selectedDetail.priorityRisks.length === 0 ? (
                      <div className="rounded-lg border border-emerald-500/20 bg-emerald-500/5 p-5">
                        <div className="flex items-center gap-2 text-emerald-300"><CheckCircle2 className="h-4 w-4" /><p className="text-sm font-semibold">No critical coverage exception recorded</p></div>
                        <p className="mt-2 text-xs text-slate-400">Current minimum competency and resilience requirements are covered for this scope.</p>
                      </div>
                    ) : (
                      <div className="flex flex-col divide-y divide-gray-800">
                        {visiblePriorityRisks.map((risk, index) => (
                          <div key={risk.id} className="flex min-w-0 flex-col gap-3 py-4 first:pt-0 last:pb-0">
                            <div className="flex items-start gap-3">
                              <div className="flex h-7 w-7 shrink-0 items-center justify-center rounded-lg bg-gray-800 text-xs font-semibold text-slate-300">{index + 1}</div>
                              <div className="min-w-0 flex-1">
                                <div className="flex flex-wrap items-center gap-2">
                                  <button type="button" onClick={() => setSelectedSkillId(risk.skillId)} className="text-left text-sm font-semibold text-slate-100 transition-colors hover:text-blue-300">{risk.skillName}</button>
                                  <Badge className={`h-auto rounded border px-2 py-0.5 text-[10px] shadow-none ${riskBadgeClass(risk.criticality)}`}>{risk.criticality}</Badge>
                                  {risk.singlePoint ? <Badge className="h-auto rounded border border-amber-400/30 bg-amber-400/10 px-2 py-0.5 text-[10px] text-amber-300 shadow-none">Single point</Badge> : null}
                                </div>
                                <p className="mt-1 text-xs text-slate-400">{risk.equipmentName} · {risk.equipmentCode} · {risk.area}</p>
                              </div>
                              <div className="shrink-0 text-right"><p className="text-xs text-slate-500">Cover</p><p className={`mt-0.5 text-sm font-semibold tabular-nums ${risk.qualifiedCount < risk.minimumRequired ? "text-red-400" : risk.singlePoint ? "text-amber-300" : "text-emerald-400"}`}>{risk.qualifiedCount}/{risk.minimumRequired}</p></div>
                            </div>
                            <div className="ml-10 grid grid-cols-1 gap-3 rounded-lg border border-gray-800 bg-[#10151d] p-3 md:grid-cols-[minmax(0,1fr)_auto] md:items-center">
                              <div><p className="text-xs leading-relaxed text-slate-300">{risk.recommendedAction}</p><p className="mt-1 text-[11px] text-slate-500">{risk.qualifiedEngineers.length > 0 ? `Current cover: ${risk.qualifiedEngineers.map((engineer) => engineer.engineerName).join(", ")}` : risk.nearestEngineers.length > 0 ? `Nearest capability: ${risk.nearestEngineers.map((engineer) => `${engineer.engineerName} L${engineer.rating}`).join(", ")}` : "No existing capability evidence found"}</p></div>
                              <div className="flex items-center gap-2"><span className="rounded-md bg-blue-500/10 px-2 py-1 text-[11px] font-semibold text-blue-300">+{risk.projectedScoreGain} pts</span><button type="button" onClick={() => navigate(`/equipment/${encodeURIComponent(risk.equipmentId)}/skills`)} className="inline-flex items-center gap-1 rounded-md border border-gray-700 px-2 py-1 text-[11px] font-medium text-slate-300 transition-colors hover:border-blue-500/40 hover:text-blue-300">Equipment <ArrowRight className="h-3 w-3" /></button></div>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                    {selectedDetail.priorityRisks.length > 3 ? <div className="flex justify-center border-t border-gray-800 pt-4"><button type="button" onClick={() => setShowAllWeaknesses((current) => !current)} className="rounded-lg border border-gray-700 bg-[#111620] px-4 py-2 text-xs font-semibold text-slate-300 transition-colors hover:border-blue-500/40 hover:text-blue-300">{showAllWeaknesses ? "Show top 3" : `View all ${selectedDetail.priorityRisks.length} weaknesses`}</button></div> : null}
                  </CardContent>
                </Card>
              </div>

'''
          text = text[:start] + native_detail + text[matrix:]

          matrix_frame = '                  <div className="w-full max-w-full overflow-hidden rounded-lg border border-gray-800">'
          area_tabs_jsx = '''                  <div className="flex min-w-0 items-center gap-2 overflow-x-auto pb-1 [scrollbar-width:none] [&::-webkit-scrollbar]:hidden">
                    {areaTabs.map((area) => {
                      const active = area.name === selectedArea;
                      const disabled = area.name !== ALL_SITE && area.count === 0;
                      return (
                        <button key={area.name} type="button" disabled={disabled} onClick={() => setSelectedArea(area.name)} aria-pressed={active} className={`shrink-0 rounded-lg border px-3 py-2 text-xs font-semibold transition-colors ${active ? "border-blue-500/40 bg-blue-500/10 text-blue-300" : disabled ? "cursor-not-allowed border-gray-900 text-slate-700" : "border-gray-800 text-slate-500 hover:border-gray-700 hover:text-slate-300"}`}>
                          {area.name}<span className="ml-1.5 text-[10px] font-medium opacity-70">{area.count}</span>
                        </button>
                      );
                    })}
                  </div>

''' + matrix_frame
          if matrix_frame not in text:
              raise SystemExit("Matrix frame not found")
          text = text.replace(matrix_frame, area_tabs_jsx, 1)

          text = text.replace(
              '''                                          {rating && rating.validationState !== "validated" && (
                                            <span className="absolute -bottom-0.5 -left-0.5 h-1.5 w-1.5 rounded-full bg-amber-300" />
                                          )}
''',
              '''                                          {rating && ["pending", "rejected", "expired"].includes(rating.validationState) && (
                                            <span className="absolute -bottom-0.5 -left-0.5 h-1.5 w-1.5 rounded-full bg-amber-300" />
                                          )}
''',
              1,
          )

          return_marker = '''    <section className="relative flex min-w-0 w-full max-w-full flex-1 grow flex-col items-start gap-6 overflow-x-hidden px-4 pb-12 pt-0 md:gap-8 md:px-6 xl:px-8">'''
          return_replacement = '''    <section className="relative flex min-w-0 w-full max-w-full flex-1 grow flex-col items-start gap-6 overflow-x-hidden px-4 pb-12 pt-0 md:gap-8 md:px-6 xl:px-8">
      <style>{`
        .skills-matrix-people-scroll { scrollbar-width: thin; scrollbar-color: rgba(96, 165, 250, 0.28) transparent; }
        .skills-matrix-people-scroll::-webkit-scrollbar { width: 5px; }
        .skills-matrix-people-scroll::-webkit-scrollbar-track { background: transparent; }
        .skills-matrix-people-scroll::-webkit-scrollbar-thumb { border-radius: 9999px; background: rgba(96, 165, 250, 0.22); }
        .skills-matrix-people-scroll:hover::-webkit-scrollbar-thumb { background: rgba(96, 165, 250, 0.38); }
      `}</style>'''
          text = text.replace(return_marker, return_replacement, 1)

          page_path.write_text(text)
          Path("src/screens/SkillsMatrix/index.ts").write_text('export { SkillsMatrixSection } from "./SkillsMatrixSection";\n')

          for obsolete in ["SkillsMatrixResolvedExperience.tsx", "SkillsMatrixStableBootstrap.tsx", "SkillsMatrixSelectionExperience.tsx", "SkillsMatrixPolished.tsx", "SkillsMatrixIntelligenceBootstrap.tsx"]:
              candidate = Path("src/screens/SkillsMatrix") / obsolete
              if candidate.exists(): candidate.unlink()

          contract = '''import assert from "node:assert/strict";
import { access, readFile } from "node:fs/promises";
const page = await readFile(new URL("../src/screens/SkillsMatrix/SkillsMatrixSection.tsx", import.meta.url), "utf8");
const entry = await readFile(new URL("../src/screens/SkillsMatrix/index.ts", import.meta.url), "utf8");
const warmup = await readFile(new URL("../src/lib/maintenancePortalFastWarmup.ts", import.meta.url), "utf8");
const prefetch = await readFile(new URL("../src/lib/maintenancePortalPrefetch.ts", import.meta.url), "utf8");
for (const requiredText of ["By Team", "By Department", "Calibration Team", "Operational Technology Team", "Capability intelligence", "Priority Coverage Weaknesses", "People &amp; Experience", "Site-wide Maintenance", "Highest-risk capability", "Coverage status", "Recorded action gain", "equipment_assets", "equipment_required_skills", "All Site", "full_name,avatar_url", "skills-matrix-people-scroll", "View all ${selectedDetail.priorityRisks.length} weaknesses"]) assert.match(page, new RegExp(requiredText.replace(/[.*+?^${}()|[\\]\\\\]/g, "\\\\$&")));
assert.match(page, /normaliseSkillsMatrixPayload/);
assert.match(page, /criticalTeamShare \* 12/);
assert.match(page, /score = Math\.min\(score, 59\)/);
assert.match(page, /new Set\(risks\.map\(\(risk\) => risk\.equipmentId\)\)/);
assert.match(page, /risks\.filter\(\(risk\) => risk\.singlePoint\)\.length/);
assert.match(page, /selectedArea === ALL_SITE/);
assert.match(page, /skillIds\.has\(skill\.id\)/);
assert.match(page, /avatarUrls\.get\(engineer\.id\)/);
assert.match(page, /priorityRisks\.slice\(0, 3\)/);
assert.match(page, /\["pending", "rejected", "expired"\]/);
assert.match(entry, /\.\/SkillsMatrixSection/);
assert.match(warmup, /schemaVersion: "capability-v3"/);
assert.match(prefetch, /schemaVersion: "capability-v3"/);
for (const forbidden of ["MutationObserver", "createPortal", "scrollIntoView", "window.scrollTo", "__vortaSkillsMatrixPayload", "vorta:skills-matrix-polished-payload", "SkillsMatrixSelectionExperience", "SkillsMatrixPolished", "SkillsMatrixResolvedExperience"]) assert.doesNotMatch(page + entry, new RegExp(forbidden.replace(/[.*+?^${}()|[\\]\\\\]/g, "\\\\$&")));
for (const obsolete of ["SkillsMatrixResolvedExperience.tsx", "SkillsMatrixStableBootstrap.tsx", "SkillsMatrixSelectionExperience.tsx", "SkillsMatrixPolished.tsx", "SkillsMatrixIntelligenceBootstrap.tsx"]) await assert.rejects(access(new URL(`../src/screens/SkillsMatrix/${obsolete}`, import.meta.url)));
console.log("Skills Matrix native contracts passed.");
'''
          Path("scripts/skills-matrix-contracts.mjs").write_text(contract)

      - name: Install dependencies
        run: npm ci
      - name: Run project checks
        run: npm run check
      - name: Commit native Skills Matrix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "4189824+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Consolidate Skills Matrix into native React workflow"
          git push origin main

