name: Equipment workflow debug

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture contracts
        id: contracts
        shell: bash
        run: |
          set +e
          npm run test:contracts > equipment-workflow-contracts.log 2>&1
          code=$?
          echo "$code" > equipment-workflow-exit-code.txt
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: equipment-workflow-debug
          path: |
            equipment-workflow-contracts.log
            equipment-workflow-exit-code.txt
          retention-days: 1
      - name: Fail if contracts failed
        if: steps.contracts.outputs.exit_code != '0'
        run: exit 1
