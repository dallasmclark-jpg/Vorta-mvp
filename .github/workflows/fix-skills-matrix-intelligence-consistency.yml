name: Fix Skills Matrix intelligence consistency

on:
  push:
    paths:
      - .github/workflows/fix-skills-matrix-intelligence-consistency.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Fix intelligence payload, specialist matching and tab stability
        shell: python
        run: |
          from pathlib import Path

          path = Path("src/screens/SkillsMatrix/SkillsMatrixSelectionExperience.tsx")
          text = path.read_text()

          marker = '''type BuildingTab = {
            name: string;
            skillCount: number;
          };

          const TEAM_VISUALS'''
          helper = '''type BuildingTab = {
            name: string;
            skillCount: number;
          };

          function average(values: number[]): number {
            if (values.length === 0) return 0;
            return values.reduce((sum, value) => sum + value, 0) / values.length;
          }

          function capabilityStatus(score: number): ScopeStatus {
            if (score < 55) return "Critical";
            if (score < 70) return "At risk";
            if (score < 85) return "Moderate";
            return "Strong";
          }

          function normalisePayload(payload: SkillsMatrixPayload): SkillsMatrixPayload {
            const teams = payload.teams.map((team) => ({
              ...team,
              name:
                team.code === "CALIBRATION"
                  ? "Calibration Team"
                  : team.code === "OT"
                    ? "Operational Technology Team"
                    : team.name,
            }));
            const shiftTeams = teams.filter((team) =>
              ["RED", "GREEN", "BLUE", "YELLOW", "DAYS"].includes(team.code),
            );
            const specialistTeams = teams.filter((team) =>
              ["CALIBRATION", "OT"].includes(team.code),
            );
            const criticalTeams = teams.filter(
              (team) => team.status === "Critical" || team.score < 55,
            );
            const criticalTeamShare =
              criticalTeams.length / Math.max(1, teams.length);

            let score = Math.round(
              payload.overall.skillsCoverage * 0.3 +
                average(shiftTeams.map((team) => team.score)) * 0.3 +
                average(specialistTeams.map((team) => team.score)) * 0.15 +
                payload.overall.experienceDepth * 0.1 +
                payload.overall.smeResilience * 0.1 +
                payload.overall.validationHealth * 0.05 -
                criticalTeamShare * 12,
            );
            if (teams.some((team) => team.score < 30)) score = Math.min(score, 59);
            score = Math.max(0, Math.min(100, score));

            return {
              ...payload,
              teams,
              overall: {
                ...payload.overall,
                score,
                status: capabilityStatus(score),
                criticalGaps: criticalTeams.length,
                spofCount: teams.filter((team) => team.spofCount > 0).length,
              },
            };
          }

          const TEAM_VISUALS'''
          if marker not in text:
            raise SystemExit("BuildingTab marker not found")
          text = text.replace(marker, helper, 1)

          old_state = '''  const [payload, setPayload] = useState<SkillsMatrixPayload | null>(() => {
              if (typeof window === "undefined") return null;
              return (
                window as unknown as {
                  __vortaSkillsMatrixPayload?: SkillsMatrixPayload;
                }
              ).__vortaSkillsMatrixPayload ?? null;
            });'''
          new_state = '''  const [payload, setPayload] = useState<SkillsMatrixPayload | null>(() => {
              if (typeof window === "undefined") return null;
              const mounted = (
                window as unknown as {
                  __vortaSkillsMatrixPayload?: SkillsMatrixPayload;
                }
              ).__vortaSkillsMatrixPayload;
              return mounted ? normalisePayload(mounted) : null;
            });'''
          if old_state not in text:
            raise SystemExit("Payload state block not found")
          text = text.replace(old_state, new_state, 1)

          old_handler = '''      const nextPayload = (event as CustomEvent<SkillsMatrixPayload>).detail;
                if (nextPayload) setPayload(nextPayload);'''
          new_handler = '''      const nextPayload = (event as CustomEvent<SkillsMatrixPayload>).detail;
                if (nextPayload) setPayload(normalisePayload(nextPayload));'''
          if old_handler not in text:
            raise SystemExit("Payload handler not found")
          text = text.replace(old_handler, new_handler, 1)

          old_heading = '''  const heading = headings.find((candidate) => textOf(candidate) === selection.title);'''
          new_heading = '''  const heading = headings.find((candidate) => {
              const headingText = textOf(candidate);
              return (
                headingText === selection.title ||
                (selection.title === "Calibration Team" && headingText === "Calibration") ||
                (selection.title === "Operational Technology Team" &&
                  headingText === "Operational Technology")
              );
            });'''
          if old_heading not in text:
            raise SystemExit("Selected heading lookup not found")
          text = text.replace(old_heading, new_heading, 1)

          old_scope = '''  return [payload.overall, ...payload.teams, ...payload.departments].find(
              (scope) => scope.name === title,
            ) ?? null;'''
          new_scope = '''  return [payload.overall, ...payload.teams, ...payload.departments].find(
              (scope) =>
                scope.name === title ||
                (scope.code === "CALIBRATION" &&
                  (title === "Calibration" || title === "Calibration Team")) ||
                (scope.code === "OT" &&
                  (title === "Operational Technology" ||
                    title === "Operational Technology Team")),
            ) ?? null;'''
          if old_scope not in text:
            raise SystemExit("Scope title lookup not found")
          text = text.replace(old_scope, new_scope, 1)

          old_metric = '''    {
                label: "Current cover",
                value: topRisk ? `${topRisk.qualifiedCount}/${topRisk.minimumRequired}` : "Covered",
              },'''
          new_metric = '''    {
                label: "Coverage status",
                value: topRisk
                  ? topRisk.qualifiedCount >= topRisk.minimumRequired && topRisk.singlePoint
                    ? `${topRisk.qualifiedCount}/${topRisk.minimumRequired} · resilience risk`
                    : `${topRisk.qualifiedCount}/${topRisk.minimumRequired}`
                  : "Covered",
              },'''
          if old_metric not in text:
            raise SystemExit("Current cover metric not found")
          text = text.replace(old_metric, new_metric, 1)

          old_tab_click = '''            onClick={() => onSelect(tab.name)}'''
          new_tab_click = '''            onClick={(event) => {
                          event.stopPropagation();
                          const scrollTop = window.scrollY;
                          onSelect(tab.name);
                          window.requestAnimationFrame(() => {
                            window.scrollTo({ top: scrollTop, behavior: "auto" });
                          });
                          window.setTimeout(() => {
                            window.scrollTo({ top: scrollTop, behavior: "auto" });
                          }, 100);
                        }}'''
          if old_tab_click not in text:
            raise SystemExit("Building tab click handler not found")
          text = text.replace(old_tab_click, new_tab_click, 1)

          text = text.replace(
            'root.addEventListener("click", scheduleEnhance, true);',
            'root.addEventListener("click", scheduleEnhance);',
            1,
          )
          text = text.replace(
            'root.removeEventListener("click", scheduleEnhance, true);',
            'root.removeEventListener("click", scheduleEnhance);',
            1,
          )

          path.write_text(text)

      - name: Commit consistency fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/screens/SkillsMatrix/SkillsMatrixSelectionExperience.tsx
          git commit -m "Fix Skills Matrix intelligence consistency"
          git push origin main
