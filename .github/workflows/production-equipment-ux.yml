name: Production Equipment UX

on:
  pull_request:
    paths:
      - "src/screens/Equipment/**"
      - "supabase/migrations/**"
      - "scripts/production-equipment-ux-contracts.mjs"
      - "tests/browser/equipment-production-list.spec.ts"
      - ".github/workflows/production-equipment-ux.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  equipment-contracts:
    name: Production Equipment UX contracts
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify production Equipment contracts
        run: node scripts/production-equipment-ux-contracts.mjs
