name: Polish Ask Vorta launcher

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/polish-vorta-ai-launcher.yml

permissions:
  contents: write

jobs:
  patch-vorta-ai-launcher:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Polish Ask Vorta launcher
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path("src/components/ai/VortaAiCommandBar.tsx")
          text = path.read_text(encoding="utf-8")

          replacements = [
              (
                  '''  Bot,
  ClipboardPaste,''',
                  '''  ClipboardPaste,''',
              ),
              (
                  '''  Plus,
  Send,
  Sparkles,''',
                  '''  Plus,
  Sparkles,''',
              ),
              (
                  '''  const [aiInput, setAiInput] = useState("");
  const recognitionRef = useRef<SpeechRecognitionLike | null>(null);''',
                  '''  const [aiInput, setAiInput] = useState("");
  const [isGlobalAiOpen, setIsGlobalAiOpen] = useState(false);
  const [showDiscoveryPulse, setShowDiscoveryPulse] = useState(false);
  const recognitionRef = useRef<SpeechRecognitionLike | null>(null);''',
              ),
              (
                  '''  useEffect(() => {
    return () => {
      recognitionRef.current?.stop();
      recognitionRef.current = null;
    };
  }, []);

  // ── Derived lists ──────────────────────────────────────────────────────────''',
                  '''  useEffect(() => {
    return () => {
      recognitionRef.current?.stop();
      recognitionRef.current = null;
    };
  }, []);

  useEffect(() => {
    const syncAssistantState = () => {
      setIsGlobalAiOpen(
        Boolean(document.querySelector('button[aria-label="Close global assistant"]')),
      );
    };

    syncAssistantState();

    const observer = new MutationObserver(syncAssistantState);
    observer.observe(document.body, { childList: true, subtree: true });

    return () => observer.disconnect();
  }, []);

  useEffect(() => {
    if (!embedded) return;

    const discoveryKey = "vorta-ai-launcher-discovered-v1";

    try {
      if (window.localStorage.getItem(discoveryKey) === "true") return;
    } catch {
      // The launcher still works when storage is unavailable.
    }

    setShowDiscoveryPulse(true);

    const timeoutId = window.setTimeout(() => {
      setShowDiscoveryPulse(false);

      try {
        window.localStorage.setItem(discoveryKey, "true");
      } catch {
        // Ignore storage restrictions.
      }
    }, 5200);

    return () => window.clearTimeout(timeoutId);
  }, [embedded]);

  // ── Derived lists ──────────────────────────────────────────────────────────''',
              ),
              (
                  '''  const fireGlobalAiPrompt = (question: string, submit: boolean) => {
    window.dispatchEvent(
      new CustomEvent("vorta-global-ai-prompt", {
        detail: { question, submit, role },
      }),
    );
  };

  const openGlobalAi = (question: string, submit = true) => {
    const trimmed = question.trim();
    if (!trimmed) return;
    recognitionRef.current?.stop();
    recognitionRef.current = null;
    setIsListening(false);
    fireGlobalAiPrompt(trimmed, submit);
    closeAllPanels();
    setAiInput("");
  };''',
                  '''  const fireGlobalAiPrompt = (question: string, submit: boolean) => {
    window.dispatchEvent(
      new CustomEvent("vorta-global-ai-prompt", {
        detail: { question, submit, role },
      }),
    );
  };

  const markCommandBarSeen = () => {
    setShowDiscoveryPulse(false);

    try {
      window.localStorage.setItem("vorta-ai-launcher-discovered-v1", "true");
    } catch {
      // Ignore storage restrictions.
    }
  };

  const openGlobalAi = (question: string, submit = false) => {
    const trimmed = question.trim();
    recognitionRef.current?.stop();
    recognitionRef.current = null;
    setIsListening(false);
    markCommandBarSeen();
    fireGlobalAiPrompt(trimmed, Boolean(trimmed) && submit);
    closeAllPanels();

    if (submit) {
      setAiInput("");
    }
  };''',
              ),
              (
                  '''            <div className="flex min-w-0 flex-1 items-center gap-2 rounded-lg border border-gray-700 bg-[#0f1218] px-2 py-1.5 focus-within:border-blue-500/50">''',
                  '''            <div
              onClick={() => openGlobalAi(aiInput, false)}
              className={`flex min-w-0 flex-1 cursor-text items-center gap-2 rounded-xl border px-2 py-1.5 transition-all duration-200 ${
                isGlobalAiOpen
                  ? "border-blue-400/40 bg-[#101621] shadow-[inset_0_1px_0_rgba(255,255,255,0.03)]"
                  : "border-blue-500/20 bg-[#0d121b] shadow-[inset_0_1px_0_rgba(255,255,255,0.025)] hover:border-blue-400/35 hover:bg-[#101621] focus-within:border-blue-400/45"
              }`}
              title="Open Vorta AI assistant"
            >''',
              ),
              (
                  '''              <div className="relative shrink-0">''',
                  '''              <div
                className="relative shrink-0"
                onClick={(event) => event.stopPropagation()}
              >''',
              ),
              (
                  '''                <Bot className="absolute left-0 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-600" />''',
                  '''                <Sparkles className="absolute left-0 top-1/2 h-4 w-4 -translate-y-1/2 text-blue-400/70" />''',
              ),
              (
                  '''                  onClick={toggleVoiceInput}''',
                  '''                  onClick={(event) => {
                    event.stopPropagation();
                    toggleVoiceInput();
                  }}''',
              ),
              (
                  '''            <Button
              type="button"
              onClick={() => openGlobalAi(aiInput, true)}
              disabled={!aiInput.trim()}
              className="h-auto gap-2 bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-blue-500 disabled:cursor-not-allowed disabled:opacity-50"
            >
              <Send className="h-4 w-4" />
              Ask
            </Button>''',
                  '''            <Button
              type="button"
              onClick={() => openGlobalAi(aiInput, false)}
              aria-pressed={isGlobalAiOpen}
              title={isGlobalAiOpen ? "Vorta AI assistant is open" : "Open Vorta AI assistant"}
              className={`h-auto min-w-[154px] gap-2 rounded-xl border px-4 py-2.5 text-sm font-semibold transition-all duration-200 ${
                isGlobalAiOpen
                  ? "border-blue-400/45 bg-blue-500/15 text-blue-100 shadow-[0_0_18px_rgba(37,99,235,0.12)] hover:bg-blue-500/20"
                  : "border-blue-500/60 bg-blue-500/10 text-blue-100 shadow-[0_0_22px_rgba(37,99,235,0.16)] hover:border-blue-400/80 hover:bg-blue-500/20"
              } ${
                showDiscoveryPulse && !isGlobalAiOpen
                  ? "motion-safe:animate-[pulse_2.4s_ease-in-out_2]"
                  : ""
              }`}
            >
              <Sparkles className="h-4 w-4" />
              {isGlobalAiOpen ? "AI Assistant Open" : "Ask Vorta AI"}
            </Button>''',
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected exactly one match, found {count}: {old[:120]!r}")
              text = text.replace(old, new, 1)

          path.write_text(text, encoding="utf-8")
          PY

      - name: Install dependencies
        run: npm install

      - name: Verify build
        run: npm run build

      - name: Commit focused AI launcher change
        shell: bash
        run: |
          rm .github/workflows/polish-vorta-ai-launcher.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/ai/VortaAiCommandBar.tsx .github/workflows/polish-vorta-ai-launcher.yml
          git commit -m "Polish Ask Vorta AI launcher"
          git push origin HEAD:main
