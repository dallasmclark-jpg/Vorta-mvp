name: Capture quality diagnostics

on:
  push:
    branches:
      - agent/maintenance-hardening-batch
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: capture-quality-diagnostics
  cancel-in-progress: true

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/maintenance-hardening-batch
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Capture release check output
        run: |
          set +e
          npm run check > quality-gate-report.txt 2>&1
          code=$?
          echo "Exit code: $code" >> quality-gate-report.txt
          cat quality-gate-report.txt
          exit 0

      - name: Commit diagnostic report
        run: |
          git config user.name "Vorta Quality Bot"
          git config user.email "actions@users.noreply.github.com"
          git add quality-gate-report.txt
          if git diff --cached --quiet; then
            echo "No diagnostic changes"
          else
            git commit -m "Capture quality gate diagnostics"
            git push origin HEAD:agent/maintenance-hardening-batch
          fi
