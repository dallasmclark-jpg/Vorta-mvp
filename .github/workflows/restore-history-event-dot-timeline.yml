name: Restore history event dot timeline

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  update-history-timeline:
    if: github.event.issue.title == 'Run history event dot timeline update'
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Restore dynamic work-event dot timeline
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          path = Path("src/screens/Equipment/EquipmentHistory.tsx")
          text = path.read_text()

          derived_pattern = re.compile(
              r'''  const maxMonthlyEvents = Math\.max\(\n.*?  const riskPoints = monthlySeries\n.*?    \.filter\(\(point\): point is string => Boolean\(point\)\);\n''',
              re.S,
          )

          derived_replacement = '''  const timelineRows = useMemo(
    () => [
      {
        label: "Preventive",
        color: "#10b981",
        events: rangedRows.filter(isPreventive),
      },
      {
        label: "Corrective",
        color: "#f59e0b",
        events: rangedRows.filter((row) => {
          const type = normalise(row.type);
          return type.includes("CORRECTIVE") && !type.includes("BREAKDOWN");
        }),
      },
      {
        label: "Inspections",
        color: "#3b82f6",
        events: rangedRows.filter(isInspection),
      },
      {
        label: "Parts replaced",
        color: "#06b6d4",
        events: rangedRows.filter((row) => {
          const type = normalise(row.type);
          const description = row.description.toLowerCase();
          return (
            type.includes("PART") ||
            description.includes("replaced") ||
            description.includes("replacement")
          );
        }),
      },
      {
        label: "Breakdowns",
        color: "#ef4444",
        events: rangedRows.filter((row) =>
          normalise(row.type).includes("BREAKDOWN"),
        ),
      },
      {
        label: "Major events",
        color: "#8b5cf6",
        events: rangedRows.filter((row) => priorityRank(row.priority) >= 3),
      },
    ],
    [rangedRows],
  );
'''

          text, count = derived_pattern.subn(derived_replacement, text, count=1)
          if count != 1:
              raise SystemExit(f"Expected to replace derived chart data once, replaced {count}")

          chart_pattern = re.compile(
              r'''              <div className="mt-5 overflow-x-auto">\n                <svg\n                  viewBox="0 0 1180 240".*?                <span>\{formatDuration\(totalDowntimeMinutes\)\} downtime in selected range</span>\n              </div>''',
              re.S,
          )

          chart_replacement = '''              <div className="mt-5 overflow-x-auto rounded-xl border border-gray-800 bg-[#0b1017]/70 p-3">
                <svg
                  viewBox="0 0 1180 250"
                  className="min-w-[820px] w-full"
                  role="img"
                  aria-label="Maintenance work-event timeline"
                >
                  {monthlySeries.map((month, index) => {
                    const x = 150 + index * (1000 / Math.max(1, monthlySeries.length - 1));
                    return (
                      <g key={`grid-${month.key}`}>
                        <line
                          x1={x}
                          x2={x}
                          y1="16"
                          y2="198"
                          stroke="#ffffff0a"
                          strokeWidth="1"
                        />
                        <text
                          x={x}
                          y="220"
                          textAnchor="middle"
                          fill="#64748b"
                          fontSize="10"
                        >
                          {month.label}
                        </text>
                        <text
                          x={x}
                          y="235"
                          textAnchor="middle"
                          fill="#3f4a5d"
                          fontSize="9"
                        >
                          {String(month.date.getFullYear()).slice(-2)}
                        </text>
                      </g>
                    );
                  })}

                  {timelineRows.map((timelineRow, rowIndex) => {
                    const y = 28 + rowIndex * 31;
                    return (
                      <g key={timelineRow.label}>
                        <line
                          x1="150"
                          x2="1150"
                          y1={y}
                          y2={y}
                          stroke="#ffffff0d"
                          strokeWidth="1"
                        />
                        <circle cx="14" cy={y} r="4" fill={timelineRow.color} />
                        <text
                          x="26"
                          y={y + 4}
                          fill="#94a3b8"
                          fontSize="11"
                          fontWeight="600"
                        >
                          {timelineRow.label}
                        </text>

                        {monthlySeries.flatMap((month, monthIndex) => {
                          const monthEvents = timelineRow.events.filter((event) => {
                            const eventDate = parseDate(event.date);
                            return eventDate ? monthKey(eventDate) === month.key : false;
                          });

                          return monthEvents.map((event, eventIndex) => {
                            const centreX =
                              150 +
                              monthIndex *
                                (1000 / Math.max(1, monthlySeries.length - 1));
                            const offset =
                              (eventIndex - (monthEvents.length - 1) / 2) * 10;
                            const severity = priorityRank(event.priority);
                            const radius = severity >= 4 ? 6 : severity >= 3 ? 5 : 4;

                            return (
                              <g
                                key={`${timelineRow.label}-${event.woNumber}-${eventIndex}`}
                                role="button"
                                tabIndex={0}
                                onClick={() => openWorkOrder(event.woNumber)}
                                onKeyDown={(keyboardEvent) => {
                                  if (keyboardEvent.key === "Enter" || keyboardEvent.key === " ") {
                                    openWorkOrder(event.woNumber);
                                  }
                                }}
                                className="cursor-pointer outline-none"
                              >
                                {severity >= 3 ? (
                                  <circle
                                    cx={centreX + offset}
                                    cy={y}
                                    r={radius + 3}
                                    fill="none"
                                    stroke={timelineRow.color}
                                    strokeWidth="1.5"
                                    opacity="0.25"
                                  />
                                ) : null}
                                <circle
                                  cx={centreX + offset}
                                  cy={y}
                                  r={radius}
                                  fill={timelineRow.color}
                                  stroke="#0b1017"
                                  strokeWidth="2"
                                  opacity={isWeakOutcome(event.outcome) ? 1 : 0.78}
                                >
                                  <title>{`${formatDate(event.date)} · ${event.woNumber} · ${event.description} · ${event.outcome}`}</title>
                                </circle>
                              </g>
                            );
                          });
                        })}
                      </g>
                    );
                  })}

                  {!loading && rangedRows.length === 0 ? (
                    <text
                      x="650"
                      y="112"
                      textAnchor="middle"
                      fill="#64748b"
                      fontSize="12"
                    >
                      No maintenance work events in the selected period
                    </text>
                  ) : null}
                </svg>
              </div>

              <div className="mt-3 flex flex-wrap items-center gap-x-5 gap-y-2 text-[11px] text-slate-500">
                {timelineRows.map((timelineRow) => (
                  <span key={timelineRow.label} className="inline-flex items-center gap-2">
                    <span
                      className="h-2.5 w-2.5 rounded-full ring-2 ring-[#141820]"
                      style={{ backgroundColor: timelineRow.color }}
                    />
                    {timelineRow.label} ({timelineRow.events.length})
                  </span>
                ))}
                <span>Outlined dots are high or critical priority</span>
                <span>Click a dot to open its work order</span>
                <span>{formatDuration(totalDowntimeMinutes)} downtime in selected range</span>
              </div>'''

          text, count = chart_pattern.subn(chart_replacement, text, count=1)
          if count != 1:
              raise SystemExit(f"Expected to replace chart JSX once, replaced {count}")

          text = text.replace(
              "Maintenance and Risk Timeline",
              "Maintenance Event Timeline",
              1,
          ).replace(
              "Monthly maintenance activity with the available equipment-risk trajectory.",
              "Each dot is a recorded work event, grouped by maintenance type and plotted across the selected history period.",
              1,
          )

          path.write_text(text)
          PY

      - name: Remove one-shot workflow
        run: rm .github/workflows/restore-history-event-dot-timeline.yml

      - name: Commit history timeline update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/screens/Equipment/EquipmentHistory.tsx .github/workflows/restore-history-event-dot-timeline.yml
          git commit -m "Restore work-event dot timeline on equipment history"
          git push origin main

      - name: Close trigger issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment "History event dot timeline update completed."
