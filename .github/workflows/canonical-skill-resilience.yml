name: Canonical skill resilience

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "scripts/canonical-skill-resilience-contracts.mjs"
      - ".github/workflows/canonical-skill-resilience.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  canonical-skill-contracts:
    name: Canonical skill resilience contracts
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify canonical skill contracts
        run: node scripts/canonical-skill-resilience-contracts.mjs
