name: Diagnose live pilot contract

on:
  push:
    branches:
      - agent/live-equipment-pilot-readiness
    paths:
      - .github/workflows/diagnose-live-pilot-contract.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/live-equipment-pilot-readiness
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Capture contract output
        id: contracts
        continue-on-error: true
        run: npm run test:contracts > live-pilot-contract-diagnostic.txt 2>&1
      - name: Commit diagnostic
        if: steps.contracts.outcome == 'failure'
        run: |
          git config user.name "vorta-release-bot"
          git config user.email "actions@users.noreply.github.com"
          git add live-pilot-contract-diagnostic.txt
          git commit -m "Record remaining live pilot contract failure [skip ci]"
          git push origin HEAD:agent/live-equipment-pilot-readiness
          exit 1
      - name: Remove diagnostic workflow after success
        if: steps.contracts.outcome == 'success'
        run: |
          rm .github/workflows/diagnose-live-pilot-contract.yml
          git config user.name "vorta-release-bot"
          git config user.email "actions@users.noreply.github.com"
          git add .github/workflows/diagnose-live-pilot-contract.yml
          git commit -m "Remove live pilot contract diagnostic [skip ci]"
          git push origin HEAD:agent/live-equipment-pilot-readiness
