name: Apply maintenance dashboard core improvements

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-maintenance-dashboard-core-v2.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply core dashboard improvements
        run: |
          cat > /tmp/patch_dashboard.py <<'PY'
          from pathlib import Path
          import re

          service_path = Path('src/screens/Equipment/equipmentService.ts')
          dashboard_path = Path('src/screens/AiOperations/sections/DashboardOverviewSection/DashboardOverviewSection.tsx')
          css_path = Path('tailwind.css')

          service = service_path.read_text()
          dashboard = dashboard_path.read_text()
          css = css_path.read_text()

          def one(text, old, new, label):
              if text.count(old) != 1:
                  raise RuntimeError(f'{label}: expected one exact match, found {text.count(old)}')
              return text.replace(old, new, 1)

          service_pattern = re.compile(
              r"export interface OperationalRiskDashboardPayload \{.*?\n\}\n\nexport async function refreshAndGetOperationalDashboard\(\):\n  Promise<OperationalRiskDashboardPayload \| null> \{.*?\n\}\n\n(?=export async function refreshOperationalRisk)",
              re.S,
          )
          service_block = '''export interface OperationalDashboardFreshness {
            maintenanceDataAt: string | null;
            workforceDataAt: string | null;
            riskCalculatedAt: string | null;
          }

          export interface OperationalRiskDashboardPayload {
            areaProfiles: AreaRiskProfile[];
            siteRisk: SiteRiskProfile | null;
            scopes: RiskDashboardScope[];
            freshness: OperationalDashboardFreshness | null;
          }

          function mapOperationalRiskDashboardPayload(
            data: unknown,
            rpcName: string,
          ): OperationalRiskDashboardPayload | null {
            if (!data || typeof data !== "object" || Array.isArray(data)) {
              console.warn(`${rpcName} returned an invalid payload.`);
              return null;
            }

            const payload = data as Record<string, unknown>;
            const areaProfiles = Array.isArray(payload.areaProfiles)
              ? payload.areaProfiles as AreaRiskProfile[]
              : [];
            const scopes = Array.isArray(payload.scopes)
              ? payload.scopes as RiskDashboardScope[]
              : [];
            const siteRisk =
              payload.siteRisk &&
              typeof payload.siteRisk === "object" &&
              !Array.isArray(payload.siteRisk)
                ? payload.siteRisk as SiteRiskProfile
                : null;
            const rawFreshness =
              payload.freshness &&
              typeof payload.freshness === "object" &&
              !Array.isArray(payload.freshness)
                ? payload.freshness as Record<string, unknown>
                : null;
            const timestamp = (value: unknown): string | null =>
              typeof value === "string" && value.trim() ? value : null;
            const freshness = rawFreshness
              ? {
                  maintenanceDataAt: timestamp(rawFreshness.maintenanceDataAt),
                  workforceDataAt: timestamp(rawFreshness.workforceDataAt),
                  riskCalculatedAt: timestamp(rawFreshness.riskCalculatedAt),
                }
              : null;

            if (!siteRisk || areaProfiles.length === 0 || scopes.length === 0) {
              console.warn(`${rpcName} returned incomplete operational data.`);
              return null;
            }

            return { areaProfiles, siteRisk, scopes, freshness };
          }

          export async function getOperationalDashboardSnapshot():
            Promise<OperationalRiskDashboardPayload | null> {
            try {
              const { data, error } = await supabase.rpc(
                "vorta_get_operational_dashboard_snapshot",
              );
              if (error) {
                console.warn(
                  "vorta_get_operational_dashboard_snapshot failed:",
                  error.message,
                );
                return null;
              }
              return mapOperationalRiskDashboardPayload(
                data,
                "vorta_get_operational_dashboard_snapshot",
              );
            } catch (error) {
              console.warn(
                "vorta_get_operational_dashboard_snapshot threw:",
                error,
              );
              return null;
            }
          }

          export async function refreshAndGetOperationalDashboard():
            Promise<OperationalRiskDashboardPayload | null> {
            try {
              const { data, error } = await supabase.rpc(
                "vorta_refresh_and_get_operational_dashboard",
              );
              if (error) {
                console.warn(
                  "vorta_refresh_and_get_operational_dashboard failed:",
                  error.message,
                );
                return null;
              }
              return mapOperationalRiskDashboardPayload(
                data,
                "vorta_refresh_and_get_operational_dashboard",
              );
            } catch (error) {
              console.warn(
                "vorta_refresh_and_get_operational_dashboard threw:",
                error,
              );
              return null;
            }
          }

          '''
          service, n = service_pattern.subn(service_block, service, count=1)
          if n != 1:
              raise RuntimeError(f'service dashboard block: {n} matches')

          dashboard = one(
              dashboard,
              'import { VortaAiCommandBar } from "../../../../components/ai/VortaAiCommandBar";\n',
              'import { VortaAiCommandBar } from "../../../../components/ai/VortaAiCommandBar";\nimport { VORTA_WORK_ORDER_DETAIL_EVENT } from "../../../Equipment/GlobalWorkOrderExecutionOverlay";\n',
              'event import',
          )
          dashboard = one(
              dashboard,
              '  refreshAndGetOperationalDashboard,\n  refreshRiskWorkPlan,',
              '  getOperationalDashboardSnapshot,\n  refreshAndGetOperationalDashboard,\n  refreshRiskWorkPlan,',
              'snapshot import',
          )
          dashboard = one(
              dashboard,
              '  type RiskDashboardScopeKpiCache,\n} from "../../../Equipment/equipmentService";',
              '  type RiskDashboardScopeKpiCache,\n  type OperationalDashboardFreshness,\n} from "../../../Equipment/equipmentService";',
              'freshness type',
          )

          dashboard = one(
              dashboard,
              'const getLabourRiskPresentation = (',
              '''const formatFreshnessTimestamp = (value: string | null | undefined): string => {
            if (!value) return "Unavailable";
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return "Unavailable";
            const minutes = Math.max(0, Math.round((Date.now() - date.getTime()) / 60_000));
            if (minutes < 1) return "just now";
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.round(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            return new Intl.DateTimeFormat("en-GB", {
              day: "numeric",
              month: "short",
              hour: "2-digit",
              minute: "2-digit",
            }).format(date);
          };

          const isFreshnessStale = (value: string | null | undefined): boolean => {
            if (!value) return true;
            const timestamp = new Date(value).getTime();
            return Number.isNaN(timestamp) || Date.now() - timestamp > 30 * 60_000;
          };

          const getLabourRiskPresentation = (''',
              'freshness helpers',
          )

          dashboard = one(
              dashboard,
              '  const riskKpiGridRef =\n    useRef<HTMLDivElement>(null);',
              '  const riskKpiGridRef =\n    useRef<HTMLDivElement>(null);\n  const hasBackgroundRefreshedRef = useRef(false);',
              'refresh ref',
          )
          dashboard = one(
              dashboard,
              '  const [\n    dashboardLoadError,\n    setDashboardLoadError,\n  ] = useState<string | null>(null);',
              '''  const [
            dashboardLoadError,
            setDashboardLoadError,
          ] = useState<string | null>(null);
          const [
            dashboardFreshness,
            setDashboardFreshness,
          ] = useState<OperationalDashboardFreshness | null>(null);''',
              'freshness state',
          )

          load_pattern = re.compile(
              r'  const loadRiskDashboard = useCallback\(.*?\n  useEffect\(\(\) => \{\n    void loadRiskDashboard\(\n      "daily",\n      "site",\n    \);\n  \}, \[loadRiskDashboard\]\);',
              re.S,
          )
          load_block = '''  const loadRiskDashboard = useCallback(
            async (
              period: RiskKpiPeriodKey,
              scopeKey: string,
              refresh = false,
            ) => {
              setDashboardRefreshing(refresh);
              setOperationalRiskLoading(true);
              setSecondaryRiskLoading(true);
              setRiskReductionPlanLoading(true);
              setRiskKpiLoading(true);
              setDashboardLoadError(null);

              try {
                const operationalDashboard = refresh
                  ? await refreshAndGetOperationalDashboard()
                  : await getOperationalDashboardSnapshot();

                if (!operationalDashboard) {
                  throw new Error("Operational dashboard data was unavailable.");
                }

                const {
                  areaProfiles,
                  siteRisk: siteProfile,
                  scopes,
                  freshness,
                } = operationalDashboard;
                setAreaRiskCards(areaProfiles);
                setSiteRisk(siteProfile);
                setRiskScopes(scopes);
                setDashboardFreshness(freshness);

                const validScopeKey = scopes.some(
                  (scope) => scope.scopeKey === scopeKey,
                ) ? scopeKey : "site";
                setSelectedRiskScopeKey(validScopeKey);
                setRiskPlanHistory([]);
                setRiskEquipmentPlanHistory([]);
                setSelectedInterventionPlan(null);
                setOperationalRiskLoading(false);

                try {
                  if (refresh && !(await refreshRiskWorkPlan())) {
                    throw new Error("The maintenance work plan could not be rebuilt.");
                  }
                  const [areaPlans, planCache, scopeKpiCache] = await Promise.all([
                    getAreaInterventionPlans(),
                    getRiskDashboardScopePlans(),
                    getRiskDashboardScopeKpis(),
                  ]);
                  setInterventionPlans(areaPlans);
                  setRiskScopePlanCache(planCache);
                  setRiskScopeKpiCache(scopeKpiCache);
                  setRiskReductionPlan(
                    planCache[validScopeKey] ?? planCache.site ?? null,
                  );
                  setRiskKpiDashboard(
                    scopeKpiCache[validScopeKey]?.[period] ??
                      scopeKpiCache.site?.[period] ??
                      scopeKpiCache.site?.daily ??
                      null,
                  );
                } catch (error) {
                  console.warn("Secondary dashboard intelligence failed:", error);
                  setDashboardLoadError(
                    "Current risk is ready, but the work plan and performance indicators could not be generated.",
                  );
                }
              } catch (error) {
                console.warn("Operational dashboard load failed:", error);
                setDashboardLoadError(
                  refresh
                    ? "Risk intelligence could not be refreshed."
                    : "The latest risk snapshot could not be loaded.",
                );
              } finally {
                setOperationalRiskLoading(false);
                setSecondaryRiskLoading(false);
                setRiskReductionPlanLoading(false);
                setRiskKpiLoading(false);
                setDashboardRefreshing(false);
              }
            },
            [],
          );

          useEffect(() => {
            void loadRiskDashboard("daily", "site", false);
          }, [loadRiskDashboard]);

          useEffect(() => {
            if (
              !dashboardFreshness?.riskCalculatedAt ||
              hasBackgroundRefreshedRef.current ||
              !isFreshnessStale(dashboardFreshness.riskCalculatedAt)
            ) return;

            hasBackgroundRefreshedRef.current = true;
            const timeoutId = window.setTimeout(() => {
              void loadRiskDashboard(
                selectedKpiPeriod,
                selectedRiskScopeKey,
                true,
              );
            }, 800);
            return () => window.clearTimeout(timeoutId);
          }, [
            dashboardFreshness?.riskCalculatedAt,
            loadRiskDashboard,
            selectedKpiPeriod,
            selectedRiskScopeKey,
          ]);'''
          dashboard, n = load_pattern.subn(load_block, dashboard, count=1)
          if n != 1:
              raise RuntimeError(f'load block: {n} matches')

          dashboard = one(
              dashboard,
              '''        <div className="flex shrink-0 items-center gap-3">
            <Button
              type="button"
              variant="secondary"
              onClick={() => void loadRiskDashboard(selectedKpiPeriod, selectedRiskScopeKey)}
              disabled={dashboardRefreshing}
              className="h-auto border border-white/10 bg-white/10 px-4 py-2 text-sm font-semibold text-slate-50 shadow-none hover:bg-white/15 hover:text-slate-50"
            >
              Run Risk Analysis
            </Button>
            <button
              type="button"
              onClick={() => void loadRiskDashboard(selectedKpiPeriod, selectedRiskScopeKey)}
              disabled={dashboardRefreshing}
              className="inline-flex h-9 w-9 items-center justify-center rounded-md text-slate-400 transition-colors hover:bg-white/5 hover:text-slate-200"
              aria-label="Refresh"
            >
              <RefreshCw className={`h-4 w-4 ${dashboardRefreshing ? "animate-spin" : ""}`} />
            </button>
            <button
              type="button"
              onClick={() => navigate("/settings")}
              className="inline-flex h-9 w-9 items-center justify-center rounded-full text-slate-400 transition-colors hover:bg-white/5 hover:text-slate-200"
              aria-label="User profile"
            >
              <UserCircle className="h-8 w-8" />
            </button>
          </div>''',
              '''        <div className="flex shrink-0 items-center gap-3">
            <Button
              type="button"
              variant="secondary"
              onClick={() => void loadRiskDashboard(
                selectedKpiPeriod,
                selectedRiskScopeKey,
                true,
              )}
              disabled={dashboardRefreshing}
              className="h-9 gap-2 border border-white/10 bg-white/10 px-4 text-sm font-semibold text-slate-50 shadow-none hover:bg-white/15 hover:text-slate-50"
            >
              <RefreshCw
                className={`h-4 w-4 ${dashboardRefreshing ? "animate-spin" : ""}`}
                aria-hidden="true"
              />
              {dashboardRefreshing ? "Refreshing…" : "Refresh risk intelligence"}
            </Button>
            <button
              type="button"
              onClick={() => navigate("/settings")}
              className="inline-flex h-9 w-9 items-center justify-center rounded-full text-slate-400 transition-colors hover:bg-white/5 hover:text-slate-200"
              aria-label="User profile"
            >
              <UserCircle className="h-8 w-8" />
            </button>
          </div>''',
              'header refresh controls',
          )

          dashboard = one(
              dashboard,
              '''              <div className="flex flex-col gap-0.5 text-left lg:items-end lg:text-right">
                <p className="text-xs text-slate-400">
                  Based on latest import
                </p>

                <p className="text-xs text-slate-500">
                  SAP / Skills / Training data refreshed 2h ago
                </p>
              </div>''',
              '''              <div className="flex flex-col gap-0.5 text-left lg:items-end lg:text-right">
                <p className={`text-xs font-medium ${
                  isFreshnessStale(dashboardFreshness?.riskCalculatedAt)
                    ? "text-yellow-400"
                    : "text-emerald-400"
                }`}>
                  Risk calculated {formatFreshnessTimestamp(
                    dashboardFreshness?.riskCalculatedAt,
                  )}
                </p>
                <p className="text-xs text-slate-500">
                  Maintenance {formatFreshnessTimestamp(
                    dashboardFreshness?.maintenanceDataAt,
                  )}
                  {" · Workforce "}
                  {formatFreshnessTimestamp(
                    dashboardFreshness?.workforceDataAt,
                  )}
                </p>
              </div>''',
              'freshness UI',
          )

          dashboard = one(
              dashboard,
              '''  const handleAssetClick = (id: string) => {
            navigate(`/equipment/${id}/overview`);
          };
''',
              '''  const handleAssetClick = (id: string) => {
            navigate(`/equipment/${id}/overview`);
          };

          const handleRiskPlanAction = useCallback(
            (equipmentId: string, action: RiskPlanAction) => {
              const route = getRiskPlanActionRoute(equipmentId, action);
              const workOrderNumber = action.workOrderNumbers[0] ?? null;
              if (workOrderNumber && route.endsWith("/work-orders")) {
                window.dispatchEvent(
                  new CustomEvent(VORTA_WORK_ORDER_DETAIL_EVENT, {
                    detail: { equipmentId, workOrderNumber },
                  }),
                );
                return;
              }
              const focus = action.pmNumbers[0] ?? action.sparePartNumbers[0] ?? null;
              navigate(focus ? `${route}?focus=${encodeURIComponent(focus)}` : route);
            },
            [navigate],
          );
''',
              'action handler',
          )

          action_pattern = re.compile(
              r'onClick=\{\(\) =>\n\s+navigate\(\n\s+getRiskPlanActionRoute\(\n\s+riskReductionPlan\.equipmentId,\n\s+action,\n\s+\),\n\s+\)\n\s+\}',
          )
          dashboard, n = action_pattern.subn(
              'onClick={() =>\n                                  handleRiskPlanAction(\n                                    riskReductionPlan.equipmentId,\n                                    action,\n                                  )\n                                }',
              dashboard,
              count=1,
          )
          if n != 1:
              raise RuntimeError(f'action click: {n} matches')

          css_pattern = re.compile(
              r'/\* Keep dashboard data freshness with the scope tabs, leaving Ask Vorta uncluttered\. \*/.*?\n\}\n\n(?=/\* Match every equipment header)',
              re.S,
          )
          css, n = css_pattern.subn('', css, count=1)
          if n != 1:
              raise RuntimeError(f'freshness CSS: {n} matches')

          service_path.write_text(service)
          dashboard_path.write_text(dashboard)
          css_path.write_text(css)
          PY
          python /tmp/patch_dashboard.py

      - name: Install and verify
        run: |
          npm ci
          npm run check

      - name: Commit core improvements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-maintenance-dashboard-improvements.yml
          git rm .github/workflows/apply-maintenance-dashboard-core-v2.yml
          git add src/screens/Equipment/equipmentService.ts \
                  src/screens/AiOperations/sections/DashboardOverviewSection/DashboardOverviewSection.tsx \
                  tailwind.css
          git commit -m "Improve maintenance dashboard trust and loading"
          git push origin main
