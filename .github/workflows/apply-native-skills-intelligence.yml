name: Apply native Skills Matrix intelligence

on:
  push:
    paths:
      - .github/workflows/apply-native-skills-intelligence.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Put capability intelligence in the page render
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('src/screens/SkillsMatrix/SkillsMatrixSection.tsx')
          text = path.read_text()

          marker = '''const TEAM_ICONS: Record<string, ElementType> = {
            OVERALL: Layers3,
            RED: Users,
            GREEN: Users,
            BLUE: Users,
            YELLOW: Users,
            DAYS: Users,
            CALIBRATION: Gauge,
            OT: Cpu,
          };
          '''
          # Source has no leading indentation. Keep the readable block here and normalise it.
          marker = marker.replace('          ', '')

          visual_block = marker + '''
          const TEAM_DETAIL_STYLES: Record<
            string,
            { card: string; accent: string; chip: string }
          > = {
            OVERALL: {
              card: "border-t-blue-400 bg-blue-500/5",
              accent: "text-blue-300",
              chip: "border-blue-400/30 bg-blue-500/10 text-blue-300",
            },
            RED: {
              card: "border-t-red-400 bg-red-500/5",
              accent: "text-red-300",
              chip: "border-red-400/30 bg-red-500/10 text-red-300",
            },
            GREEN: {
              card: "border-t-emerald-400 bg-emerald-500/5",
              accent: "text-emerald-300",
              chip: "border-emerald-400/30 bg-emerald-500/10 text-emerald-300",
            },
            BLUE: {
              card: "border-t-blue-400 bg-blue-500/5",
              accent: "text-blue-300",
              chip: "border-blue-400/30 bg-blue-500/10 text-blue-300",
            },
            YELLOW: {
              card: "border-t-yellow-300 bg-yellow-400/5",
              accent: "text-yellow-300",
              chip: "border-yellow-300/30 bg-yellow-400/10 text-yellow-300",
            },
            DAYS: {
              card: "border-t-slate-300 bg-slate-300/5",
              accent: "text-slate-200",
              chip: "border-slate-300/30 bg-slate-300/10 text-slate-200",
            },
            CALIBRATION: {
              card: "border-t-purple-400 bg-purple-500/5",
              accent: "text-purple-300",
              chip: "border-purple-400/30 bg-purple-500/10 text-purple-300",
            },
            OT: {
              card: "border-t-cyan-400 bg-cyan-500/5",
              accent: "text-cyan-300",
              chip: "border-cyan-400/30 bg-cyan-500/10 text-cyan-300",
            },
          };
          '''.replace('          ', '')

          if 'const TEAM_DETAIL_STYLES' not in text:
              if marker not in text:
                  raise SystemExit('Could not find TEAM_ICONS block')
              text = text.replace(marker, visual_block, 1)

          start_marker = '              <Card className="w-full rounded-xl border border-gray-800 bg-[#141820] shadow-none">'
          end_marker = '              <div className="grid w-full grid-cols-1 gap-6 xl:grid-cols-[minmax(0,1.55fr)_minmax(300px,0.75fr)]">'
          start = text.find(start_marker)
          end = text.find(end_marker, start)
          if start == -1 or end == -1:
              raise SystemExit('Could not find selected-scope summary block')

          intelligence = '''              {(() => {
                const priorityRisks = selectedDetail.priorityRisks ?? [];
                const topRisk = priorityRisks[0] ?? null;
                const assetCount =
                  new Set(priorityRisks.map((risk) => risk.equipmentId)).size ||
                  selectedSummary.affectedEquipment;
                const singlePointCount = priorityRisks.filter(
                  (risk) => risk.singlePoint,
                ).length;
                const visual =
                  TEAM_DETAIL_STYLES[selectedSummary.code] ??
                  TEAM_DETAIL_STYLES.OVERALL;
                const narrative = topRisk
                  ? `${selectedSummary.name} is ${selectedSummary.status.toLowerCase()} at ${selectedSummary.score}/100. ${priorityRisks.length} ranked coverage ${priorityRisks.length === 1 ? "record affects" : "records affect"} ${assetCount} ${assetCount === 1 ? "asset" : "assets"}, including ${singlePointCount} single-person ${singlePointCount === 1 ? "dependency" : "dependencies"}. The highest-ranked exposure is ${topRisk.skillName} on ${topRisk.equipmentName}, with current cover ${topRisk.qualifiedCount}/${topRisk.minimumRequired}.`
                  : `${selectedSummary.name} has no priority coverage exceptions in the current Skills Matrix dataset. Its capability score is calculated from the selected scope's live competency, experience, SME-resilience and validation records.`;
                const intelligenceMetrics = [
                  {
                    label: "Highest-risk capability",
                    value: topRisk?.skillName ?? "No current exception",
                  },
                  {
                    label: "Current cover",
                    value: topRisk
                      ? `${topRisk.qualifiedCount}/${topRisk.minimumRequired}`
                      : "Covered",
                  },
                  {
                    label: "Assets affected",
                    value: String(assetCount),
                  },
                  {
                    label: "Recorded action gain",
                    value: topRisk
                      ? `+${topRisk.projectedScoreGain} pts`
                      : "No action required",
                  },
                ];

                return (
                  <Card
                    className={`w-full rounded-xl border border-t-2 border-gray-800 shadow-none ${visual.card}`}
                    data-capability-intelligence="true"
                  >
                    <CardContent className="p-5 lg:p-6">
                      <div className="flex flex-col gap-5 lg:flex-row lg:items-start lg:justify-between">
                        <div className="min-w-0 max-w-4xl">
                          <div className="flex flex-wrap items-center gap-2">
                            <span
                              className={`rounded border px-2 py-1 text-[10px] font-semibold uppercase tracking-[0.16em] ${visual.chip}`}
                            >
                              Capability intelligence
                            </span>
                            <Badge
                              className={`h-auto rounded border px-2 py-1 text-[10px] font-semibold shadow-none ${statusBadgeClass(selectedSummary.status)}`}
                            >
                              {selectedSummary.status}
                            </Badge>
                          </div>
                          <h2 className="mt-3 text-lg font-semibold text-slate-50">
                            {selectedSummary.name} Capability Briefing
                          </h2>
                          <p className="mt-2 text-sm leading-6 text-slate-300">
                            {narrative}
                          </p>
                          {topRisk && (
                            <p className="mt-2 text-xs leading-5 text-slate-500">
                              <span className="font-semibold text-slate-400">
                                Recorded action:
                              </span>{" "}
                              {topRisk.recommendedAction}
                            </p>
                          )}
                        </div>
                        <div className="shrink-0 text-left lg:text-right">
                          <p className="text-[10px] font-semibold uppercase tracking-[0.14em] text-slate-500">
                            Live capability score
                          </p>
                          <div className="mt-1 flex items-end gap-1 lg:justify-end">
                            <span
                              className={`text-3xl font-semibold tabular-nums ${visual.accent}`}
                            >
                              {selectedSummary.score}
                            </span>
                            <span className="pb-1 text-xs text-slate-600">
                              / 100
                            </span>
                          </div>
                        </div>
                      </div>

                      <div className="mt-5 grid grid-cols-1 gap-3 border-t border-white/10 pt-4 sm:grid-cols-2 xl:grid-cols-4">
                        {intelligenceMetrics.map((metric) => (
                          <div
                            key={metric.label}
                            className="min-w-0 rounded-lg border border-white/10 bg-black/10 px-4 py-3"
                          >
                            <p className="text-[10px] font-medium uppercase tracking-[0.1em] text-slate-500">
                              {metric.label}
                            </p>
                            <p
                              className="mt-1 truncate text-sm font-semibold text-slate-100"
                              title={metric.value}
                            >
                              {metric.value}
                            </p>
                          </div>
                        ))}
                      </div>

                      <p className="mt-3 text-[10px] text-slate-600">
                        Derived from the selected scope's current equipment requirements,
                        engineer capability evidence and ranked coverage records.
                      </p>
                    </CardContent>
                  </Card>
                );
              })()}

'''

          text = text[:start] + intelligence + text[end:]
          path.write_text(text)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/screens/SkillsMatrix/SkillsMatrixSection.tsx
          git commit -m "Render Skills Matrix intelligence natively"
          git push origin main
