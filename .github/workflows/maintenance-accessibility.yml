name: Maintenance accessibility

on:
  pull_request:
    paths:
      - "src/components/MaintenancePortalHardening.tsx"
      - "src/components/PortalShell.tsx"
      - "src/screens/Equipment/EquipmentTabNavigation.tsx"
      - "src/screens/LabourRisk/LiveShiftCoverPage.tsx"
      - "scripts/accessibility-navigation-contracts.mjs"
      - "tests/browser/maintenance-manager-accessibility.spec.ts"
      - "package.json"
      - ".github/workflows/maintenance-accessibility.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  accessibility-contracts:
    name: Accessibility navigation contracts
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify keyboard and focus contracts
        run: node scripts/accessibility-navigation-contracts.mjs
