name: Apply equipment notifications intelligence redesign

on:
  push:
    branches:
      - main
    paths:
      - .github/notifications-intelligence-trigger

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Write redesigned notifications page
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import base64

          payload = """.....TRUNCATED_FOR_DISPLAY_ONLY..."""
          Path("src/screens/Equipment/EquipmentNotifications.tsx").write_bytes(
              base64.b64decode(payload)
          )
          PY

      - name: Install dependencies
        run: npm install

      - name: Verify contracts and production build
        run: npm run check

      - name: Commit focused redesign
        shell: bash
        run: |
          rm .github/workflows/apply-equipment-notifications-intelligence.yml
          rm .github/notifications-intelligence-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/screens/Equipment/EquipmentNotifications.tsx .github/workflows/apply-equipment-notifications-intelligence.yml .github/notifications-intelligence-trigger
          git commit -m "Redesign equipment notifications as risk intelligence"
          git push origin HEAD:main
