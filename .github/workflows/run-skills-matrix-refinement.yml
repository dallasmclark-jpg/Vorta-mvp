name: Run Skills Matrix selection refinement

on:
  push:
    paths:
      - .github/workflows/run-skills-matrix-refinement.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Apply the prepared Skills Matrix patch
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          from textwrap import dedent

          workflow = Path('.github/workflows/refine-skills-matrix-selection.yml').read_text()
          marker = "          python <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY", start)
          script = dedent(workflow[start:end])
          exec(compile(script, 'skills-matrix-refinement', 'exec'))
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/screens/SkillsMatrix/SkillsMatrixSection.tsx scripts/skills-matrix-contracts.mjs
          git commit -m "Refine Skills Matrix selected team workflow"
          git push origin main
