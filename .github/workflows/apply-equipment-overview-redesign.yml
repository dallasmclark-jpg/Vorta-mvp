      - name: Install dependencies
        run: npm install

      - name: Verify contracts
        run: npm run test:contracts

      - name: Verify production build
        run: npm run build

      - name: Commit focused overview redesign
        shell: bash
        run: |
          rm .github/workflows/apply-equipment-overview-redesign.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/screens/Equipment/EquipmentOverview.tsx .github/workflows/apply-equipment-overview-redesign.yml
          git commit -m "Redesign equipment overview as intelligence command centre"
          git push origin HEAD:main
