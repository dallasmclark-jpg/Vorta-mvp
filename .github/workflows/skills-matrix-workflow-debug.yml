name: Skills Matrix workflow debug

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply data trust migration
        run: node scripts/apply-skills-matrix-data-trust-fix.mjs
      - name: Repair workflow migration
        run: node scripts/repair-skills-matrix-workflow-codemod.mjs
      - name: Capture workflow migration result
        id: migration
        shell: bash
        run: |
          set +e
          node scripts/apply-skills-matrix-workflow-fix.mjs > skills-matrix-workflow-debug.log 2>&1
          code=$?
          echo "$code" > skills-matrix-workflow-exit-code.txt
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: skills-matrix-workflow-debug
          path: |
            skills-matrix-workflow-debug.log
            skills-matrix-workflow-exit-code.txt
      - name: Fail if migration failed
        if: steps.migration.outputs.exit_code != '0'
        run: exit 1
