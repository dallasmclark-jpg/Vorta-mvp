name: Repair equipment capability intelligence redesign

on:
  push:
    branches:
      - main
    paths:
      - .github/skills-intelligence-trigger-v2

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Recover and write capability intelligence page
        shell: bash
        run: |
          python - <<'PY'
          import base64, pathlib, re, zlib
          workflow = pathlib.Path('.github/workflows/apply-skills-intelligence.yml').read_text()
          match = re.search(r'SKILLS_PAGE_ZLIB_B64: "([^"]+)"', workflow)
          if not match:
              raise SystemExit('Capability page payload was not found')
          content = zlib.decompress(base64.b64decode(match.group(1))).decode()
          content = content.replace('  CheckCircle2,\n', '')
          pathlib.Path('src/screens/Equipment/EquipmentSkills.tsx').write_text(content)
          PY

      - name: Validate production build
        run: |
          npm ci
          npm run build

      - name: Commit redesign and remove temporary workflows
        shell: bash
        run: |
          rm -f .github/skills-intelligence-trigger
          rm -f .github/skills-intelligence-trigger-v2
          rm -f .github/workflows/apply-skills-intelligence.yml
          rm -f .github/workflows/apply-skills-intelligence-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/screens/Equipment/EquipmentSkills.tsx .github/skills-intelligence-trigger .github/skills-intelligence-trigger-v2 .github/workflows/apply-skills-intelligence.yml .github/workflows/apply-skills-intelligence-v2.yml
          git commit -m "Redesign equipment skills as capability intelligence"
          git push origin main
