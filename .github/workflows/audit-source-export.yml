name: Audit remediation source export

on:
  push:
    branches:
      - agent/audit-remediation-p1-p2
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v4

      - name: Package repository source
        shell: bash
        run: |
          zip -qr vorta-source.zip . \
            -x '.git/*' \
            -x 'node_modules/*' \
            -x 'dist/*' \
            -x 'playwright-report/*' \
            -x 'test-results/*'

      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: vorta-audit-source-${{ github.sha }}
          path: vorta-source.zip
          if-no-files-found: error
          retention-days: 1
