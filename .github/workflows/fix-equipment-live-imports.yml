name: Fix Equipment live imports

on:
  pull_request:
    branches:
      - main
    paths:
      - "scripts/fix-equipment-live-imports.mjs"
      - ".github/workflows/fix-equipment-live-imports.yml"

permissions:
  contents: write

jobs:
  fix:
    if: ${{ github.head_ref == 'agent/equipment-live-service-audit' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/equipment-live-service-audit
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --silent
      - name: Apply import repair
        run: node scripts/fix-equipment-live-imports.mjs
      - name: Commit inspectable repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Repair consolidated Equipment live imports"
          git push origin HEAD:agent/equipment-live-service-audit
      - name: Verify TypeScript
        run: npm run typecheck -- --pretty false
      - name: Verify contracts
        run: npm run test:contracts
      - name: Verify route smoke
        run: npm run test:smoke
