name: Apply set-based KPI syntax fix

on:
  push:
    branches:
      - agent/set-based-dashboard-kpis
    paths:
      - "scripts/apply-set-based-kpi-window-alias-fix.mjs"
      - ".github/workflows/apply-set-based-kpi-syntax-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/set-based-dashboard-kpis
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Apply reserved-alias correction
        run: node scripts/apply-set-based-kpi-window-alias-fix.mjs

      - name: Remove one-time scaffolding
        run: |
          rm scripts/apply-set-based-kpi-window-alias-fix.mjs
          rm .github/workflows/apply-set-based-kpi-syntax-fix.yml

      - name: Commit correction
        run: |
          git config user.name "Vorta CI"
          git config user.email "actions@users.noreply.github.com"
          git add supabase/migrations/20260720100000_set_based_dashboard_kpis.sql scripts/apply-set-based-kpi-window-alias-fix.mjs .github/workflows/apply-set-based-kpi-syntax-fix.yml
          git commit -m "Fix reserved alias in set-based KPI migration"
          git push origin HEAD:agent/set-based-dashboard-kpis
