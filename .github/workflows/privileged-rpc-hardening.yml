name: Privileged RPC hardening

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "scripts/privileged-rpc-hardening-contracts.mjs"
      - ".github/workflows/privileged-rpc-hardening.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  privileged-rpc-contracts:
    name: Privileged RPC hardening contracts
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify privileged RPC contracts
        run: node scripts/privileged-rpc-hardening-contracts.mjs
