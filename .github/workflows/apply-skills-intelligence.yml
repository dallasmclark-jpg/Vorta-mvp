name: Apply equipment capability intelligence redesign

on:
  push:
    branches:
      - main
    paths:
      - .github/skills-intelligence-trigger

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Write capability intelligence page
        shell: bash
        env:
          SKILLS_PAGE_ZLIB_B64: ""
        run: |
          python - <<'PY'
          import base64, os, pathlib, zlib
          payload = base64.b64decode(os.environ['SKILLS_PAGE_ZLIB_B64'])
          content = zlib.decompress(payload)
          path = pathlib.Path('src/screens/Equipment/EquipmentSkills.tsx')
          path.write_bytes(content)
          PY

      - name: Validate production build
        run: |
          npm ci
          npm run build

      - name: Commit redesign and remove temporary workflow
        shell: bash
        run: |
          rm -f .github/skills-intelligence-trigger
          rm -f .github/workflows/apply-skills-intelligence.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/screens/Equipment/EquipmentSkills.tsx .github/skills-intelligence-trigger .github/workflows/apply-skills-intelligence.yml
          git commit -m "Redesign equipment skills as capability intelligence"
          git push origin main
