name: Risk model scale

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "scripts/risk-model-scale-contracts.mjs"
      - ".github/workflows/risk-model-scale.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scale-contracts:
    name: Risk scale contracts
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify population-neutral risk model
        run: node scripts/risk-model-scale-contracts.mjs
