name: Apply live Equipment pilot batches

on:
  push:
    branches:
      - agent/live-equipment-pilot-readiness
    paths:
      - scripts/apply-live-pilot-batches.mjs
      - .github/workflows/apply-live-pilot-batches.yml
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - scripts/apply-live-pilot-batches.mjs
      - .github/workflows/apply-live-pilot-batches.yml

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.head_ref == 'agent/live-equipment-pilot-readiness' || github.ref_name == 'agent/live-equipment-pilot-readiness'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/live-equipment-pilot-readiness
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Normalise codemod source literals
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/apply-live-pilot-batches.mjs")
          source = path.read_text()

          literal_replacements = [
              (
                  r'new Date(\`${value}T00:00:00\`);',
                  r'new Date(\`\${value}T00:00:00\`);',
                  2,
                  "parseDate templates",
              ),
              (
                  '`                         {value}%`',
                  '`                        {value}%`',
                  1,
                  "readiness value target",
              ),
              (
                  '`                         style={{ width: \\`${"${value}"}%\\` }}`',
                  '`                        style={{ width: \\`${"${value}"}%\\` }}`',
                  1,
                  "readiness bar target",
              ),
          ]
          for before, after, expected, label in literal_replacements:
              count = source.count(before)
              if count != expected:
                  raise SystemExit(f"Expected {expected} {label} matches, found {count}")
              source = source.replace(before, after)

          old_helpers = '''function replaceRequired(source, before, after, label) {
            const occurrences = source.split(before).length - 1;
            if (occurrences !== 1) {
              throw new Error(`${label}: expected exactly one match, found ${occurrences}`);
            }
            return source.replace(before, after);
          }

          function replaceAllRequired(source, before, after, minimum, label) {
            const occurrences = source.split(before).length - 1;
            if (occurrences < minimum) {
              throw new Error(`${label}: expected at least ${minimum} matches, found ${occurrences}`);
            }
            return source.split(before).join(after);
          }'''.replace('          ', '')

          new_helpers = r'''function escapeRegExp(value) {
            return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          }

          function whitespaceFlexiblePattern(value) {
            return value
              .split("\n")
              .map((line) => {
                const trimmed = line.trimStart();
                return (line.length === trimmed.length ? "" : "[\\t ]*") + escapeRegExp(trimmed);
              })
              .join("\\n");
          }

          function replaceRequired(source, before, after, label) {
            const occurrences = source.split(before).length - 1;
            if (occurrences === 1) return source.replace(before, after);
            if (occurrences > 1) {
              throw new Error(label + ": expected exactly one match, found " + occurrences);
            }
            const pattern = whitespaceFlexiblePattern(before);
            const expression = new RegExp(pattern, "g");
            const matches = source.match(expression) ?? [];
            if (matches.length !== 1) {
              throw new Error(label + ": expected exactly one structural match, found " + matches.length);
            }
            return source.replace(new RegExp(pattern), after);
          }

          function replaceAllRequired(source, before, after, minimum, label) {
            const occurrences = source.split(before).length - 1;
            if (occurrences >= minimum) return source.split(before).join(after);
            const pattern = whitespaceFlexiblePattern(before);
            const expression = new RegExp(pattern, "g");
            const matches = source.match(expression) ?? [];
            if (matches.length < minimum) {
              throw new Error(label + ": expected at least " + minimum + " structural matches, found " + matches.length);
            }
            return source.replace(expression, after);
          }'''.replace('          ', '')

          helper_count = source.count(old_helpers)
          if helper_count != 1:
              raise SystemExit(f"Expected one codemod helper block, found {helper_count}")
          source = source.replace(old_helpers, new_helpers)

          path.write_text(source)
          PY

      - name: Apply focused code changes
        id: codemod
        continue-on-error: true
        run: node scripts/apply-live-pilot-batches.mjs > codemod-error.txt 2>&1

      - name: Publish codemod diagnostic
        if: steps.codemod.outcome == 'failure'
        run: |
          cat codemod-error.txt
          git config user.name "vorta-release-bot"
          git config user.email "actions@users.noreply.github.com"
          git add codemod-error.txt
          git commit -m "Record live pilot codemod diagnostic [skip ci]"
          git push origin HEAD:agent/live-equipment-pilot-readiness
          exit 1

      - name: Install dependencies
        if: steps.codemod.outcome == 'success'
        run: npm ci

      - name: Typecheck Maintenance Manager
        if: steps.codemod.outcome == 'success'
        run: npm run typecheck

      - name: Run contract gates
        if: steps.codemod.outcome == 'success'
        run: npm run test:contracts

      - name: Commit verified changes
        if: steps.codemod.outcome == 'success'
        run: |
          rm scripts/apply-live-pilot-batches.mjs
          rm .github/workflows/apply-live-pilot-batches.yml
          rm codemod-error.txt
          git config user.name "vorta-release-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/screens/Equipment scripts .github/workflows codemod-error.txt
          git commit -m "Harden live Equipment pilot evidence [skip ci]"
          git push origin HEAD:agent/live-equipment-pilot-readiness
