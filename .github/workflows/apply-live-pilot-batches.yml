name: Apply live Equipment pilot batches

on:
  push:
    branches:
      - agent/live-equipment-pilot-readiness
    paths:
      - scripts/apply-live-pilot-batches.mjs
      - .github/workflows/apply-live-pilot-batches.yml
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - scripts/apply-live-pilot-batches.mjs
      - .github/workflows/apply-live-pilot-batches.yml

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.head_ref == 'agent/live-equipment-pilot-readiness' || github.ref_name == 'agent/live-equipment-pilot-readiness'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/live-equipment-pilot-readiness
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Normalise codemod source literals
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/apply-live-pilot-batches.mjs")
          source = path.read_text()

          parse_before = r'new Date(\`${value}T00:00:00\`);'
          parse_after = r'new Date(\`\${value}T00:00:00\`);'
          parse_count = source.count(parse_before)
          if parse_count != 2:
              raise SystemExit(f"Expected 2 parseDate template matches, found {parse_count}")
          source = source.replace(parse_before, parse_after)

          schedule_before = '`               loading={loading}`'
          schedule_after = '`              loading={loading}`'
          schedule_count = source.count(schedule_before)
          if schedule_count != 1:
              raise SystemExit(f"Expected 1 schedule-loading match, found {schedule_count}")
          source = source.replace(schedule_before, schedule_after)

          path.write_text(source)
          PY

      - name: Apply focused code changes
        id: codemod
        continue-on-error: true
        run: node scripts/apply-live-pilot-batches.mjs > codemod-error.txt 2>&1

      - name: Publish codemod diagnostic
        if: steps.codemod.outcome == 'failure'
        run: |
          cat codemod-error.txt
          git config user.name "vorta-release-bot"
          git config user.email "actions@users.noreply.github.com"
          git add codemod-error.txt
          git commit -m "Record live pilot codemod diagnostic [skip ci]"
          git push origin HEAD:agent/live-equipment-pilot-readiness
          exit 1

      - name: Install dependencies
        if: steps.codemod.outcome == 'success'
        run: npm ci

      - name: Typecheck Maintenance Manager
        if: steps.codemod.outcome == 'success'
        run: npm run typecheck

      - name: Run contract gates
        if: steps.codemod.outcome == 'success'
        run: npm run test:contracts

      - name: Commit verified changes
        if: steps.codemod.outcome == 'success'
        run: |
          rm scripts/apply-live-pilot-batches.mjs
          rm .github/workflows/apply-live-pilot-batches.yml
          rm codemod-error.txt
          git config user.name "vorta-release-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/screens/Equipment scripts .github/workflows codemod-error.txt
          git commit -m "Harden live Equipment pilot evidence [skip ci]"
          git push origin HEAD:agent/live-equipment-pilot-readiness
