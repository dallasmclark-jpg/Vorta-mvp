name: Authenticated read RPC review

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "scripts/authenticated-read-rpc-contracts.mjs"
      - ".github/workflows/authenticated-read-rpc-review.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  read-rpc-contracts:
    name: Authenticated read RPC contracts
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify authenticated read RPC contracts
        run: node scripts/authenticated-read-rpc-contracts.mjs
