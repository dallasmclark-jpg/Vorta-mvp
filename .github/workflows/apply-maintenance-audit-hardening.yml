name: Apply Maintenance Manager audit hardening

on:
  push:
    branches:
      - agent/maintenance-audit-hardening-2
    paths:
      - scripts/apply-maintenance-audit-hardening.mjs
      - .github/workflows/apply-maintenance-audit-hardening.yml

permissions:
  contents: write

concurrency:
  group: apply-maintenance-audit-hardening
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/maintenance-audit-hardening-2
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply asserted hardening codemod
        run: node scripts/apply-maintenance-audit-hardening.mjs

      - name: Remove one-time codemod files
        run: |
          rm scripts/apply-maintenance-audit-hardening.mjs
          rm .github/workflows/apply-maintenance-audit-hardening.yml

      - name: Install dependencies
        run: npm ci --silent

      - name: Run static release checks
        run: |
          npm run typecheck -- --pretty false
          npm run test:contracts
          npm run test:smoke
          npx vite build

      - name: Commit the complete audit batch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement Maintenance Manager audit improvements"
          git push origin HEAD:agent/maintenance-audit-hardening-2
