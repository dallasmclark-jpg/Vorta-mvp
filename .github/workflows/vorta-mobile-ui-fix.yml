          PY

      - name: Install dependencies
        run: npm ci

      - name: Run focused quality gates
        run: |
          npm run typecheck
          npm run test:contracts
          npm run test:smoke

      - name: Commit completed fix
        shell: bash
        run: |
          rm .github/workflows/vorta-mobile-ui-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/PortalShell.tsx \
            src/screens/AiOperations/sections/DashboardOverviewSection/DashboardOverviewSection.tsx \
            tests/browser/maintenance-manager-core.spec.ts \
            scripts/mobile-dashboard-contracts.mjs \
