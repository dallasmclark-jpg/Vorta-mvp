name: Remove equipment health page

on:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  cleanup:
    if: github.event.issue.title == 'Run equipment health cleanup'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Remove Health page and navigation
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const equipmentDir = path.join('src', 'screens', 'Equipment');
          const equipmentFiles = fs.readdirSync(equipmentDir)
            .filter((file) => file.endsWith('.tsx'));

          for (const file of equipmentFiles) {
            const filePath = path.join(equipmentDir, file);
            let source = fs.readFileSync(filePath, 'utf8');
            const original = source;

            source = source.replace(
              /^\s*\{\s*label:\s*["']Health["'],\s*id:\s*["']health["']\s*\},?\s*\r?\n/gm,
              '',
            );
            source = source.replace(
              /^\s*if\s*\(\s*tabId\s*===\s*["']health["']\s*\)\s*navigate\(`\/equipment\/\$\{id\}\/health`\);\s*\r?\n/gm,
              '',
            );
            source = source.replace(
              /^\s*<button\s+type="button"\s+className="text-xs text-blue-400 hover:text-blue-300 transition-colors whitespace-nowrap">View Health →<\/button>\s*\r?\n/gm,
              '',
            );

            if (source !== original) {
              fs.writeFileSync(filePath, source);
            }
          }

          const routesPath = path.join('src', 'screens', 'AiOperations', 'AiOperations.tsx');
          let routes = fs.readFileSync(routesPath, 'utf8');
          routes = routes.replace(/,\s*EquipmentHealth\b/, '');
          routes = routes.replace(
            /^\s*<Route path="equipment\/:equipmentId\/health"\s+element=\{<EquipmentHealth\s*\/>\}\s*\/>\s*\r?\n/gm,
            '',
          );
          fs.writeFileSync(routesPath, routes);

          const indexPath = path.join(equipmentDir, 'index.ts');
          let indexSource = fs.readFileSync(indexPath, 'utf8');
          indexSource = indexSource.replace(
            /^export \{ EquipmentHealth \} from "\.\/EquipmentHealth";\s*\r?\n/gm,
            '',
          );
          fs.writeFileSync(indexPath, indexSource);

          const healthPath = path.join(equipmentDir, 'EquipmentHealth.tsx');
          if (fs.existsSync(healthPath)) fs.unlinkSync(healthPath);
          NODE

      - name: Verify Health references are gone
        shell: bash
        run: |
          if grep -RInE 'EquipmentHealth|label:[[:space:]]*["'"']Health["'"']|/health|View Health' \
            src/screens/Equipment src/screens/AiOperations; then
            echo 'Stale equipment Health reference found.'
            exit 1
          fi

      - name: Build application
        run: |
          npm ci
          npm run build

      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/workflows/remove-equipment-health.yml
          rm -f .github/health-cleanup-trigger
          git add -A
          git commit -m "Remove equipment health page"
          git push
