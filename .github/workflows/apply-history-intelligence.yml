name: Apply history intelligence redesign

on:
  push:
    branches:
      - main
    paths:
      - .github/history-intelligence-trigger

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Write reliability history intelligence page
        shell: bash
        env:
          HISTORY_PAGE_ZLIB_B64: ""
        run: |
          python - <<'PY'
          import base64, os, pathlib, zlib
          content = zlib.decompress(base64.b64decode(os.environ['HISTORY_PAGE_ZLIB_B64']))
          pathlib.Path('src/screens/Equipment/EquipmentHistory.tsx').write_bytes(content)
          PY

      - name: Commit redesign
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/screens/Equipment/EquipmentHistory.tsx
          git commit -m 'Redesign equipment history as reliability intelligence'
          git push origin main
