name: Apply live backend health gate

on:
  push:
    branches:
      - agent/live-backend-health-gate
    paths:
      - scripts/apply-live-backend-health-workflow.mjs
      - .github/workflows/apply-live-backend-health-workflow.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/live-backend-health-gate

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate codemod syntax
        run: node --check scripts/apply-live-backend-health-workflow.mjs

      - name: Install health gate in release workflow
        run: node scripts/apply-live-backend-health-workflow.mjs

      - name: Remove one-time scaffolding
        run: |
          rm scripts/apply-live-backend-health-workflow.mjs
          rm .github/workflows/apply-live-backend-health-workflow.yml

      - name: Commit targeted workflow result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/maintenance-manager-quality.yml scripts/apply-live-backend-health-workflow.mjs .github/workflows/apply-live-backend-health-workflow.yml
          git commit -m "Run authenticated backend health in release gate"
          git push origin HEAD:agent/live-backend-health-gate
