name: Run equipment spares intelligence redesign

on:
  push:
    branches:
      - main
    paths:
      - .github/spares-redesign-trigger

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract and write redesigned page
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import base64
          import re

          workflow = Path('.github/workflows/apply-equipment-spares-redesign.yml').read_text()
          match = re.search(r'base64\.b64decode\("""([A-Za-z0-9+/=]+)"""\)', workflow)
          if not match:
              raise SystemExit('Embedded spares page payload was not found')
          Path('src/screens/Equipment/EquipmentSpares.tsx').write_bytes(base64.b64decode(match.group(1)))
          PY

      - name: Install dependencies
        run: npm install

      - name: Verify contracts and production build
        run: npm run check

      - name: Commit focused redesign
        shell: bash
        run: |
          rm .github/workflows/apply-equipment-spares-redesign.yml
          rm .github/workflows/run-equipment-spares-redesign.yml
          rm .github/spares-redesign-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/screens/Equipment/EquipmentSpares.tsx .github/workflows/apply-equipment-spares-redesign.yml .github/workflows/run-equipment-spares-redesign.yml .github/spares-redesign-trigger
          git commit -m "Redesign equipment spares as resilience intelligence"
          git push origin HEAD:main
