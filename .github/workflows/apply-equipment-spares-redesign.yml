name: Apply equipment spares intelligence redesign

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-equipment-spares-redesign.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Write redesigned equipment spares page
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import base64

          content = base64.b64decode("""""")
          Path("src/screens/Equipment/EquipmentSpares.tsx").write_bytes(content)
          PY

      - name: Install dependencies
        run: npm install

      - name: Verify contracts and production build
        run: npm run check

      - name: Commit focused redesign
        shell: bash
        run: |
          rm .github/workflows/apply-equipment-spares-redesign.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/screens/Equipment/EquipmentSpares.tsx .github/workflows/apply-equipment-spares-redesign.yml
          git commit -m "Redesign equipment spares as resilience intelligence"
          git push origin HEAD:main
