name: Apply Equipment live service boundaries

on:
  pull_request:
    branches:
      - main
    paths:
      - "scripts/audit-equipment-live-service.mjs"
      - ".github/workflows/run-equipment-live-service-audit.yml"
      - "docs/audits/.equipment-live-service-audit-trigger"

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.head_ref == 'agent/equipment-live-service-audit' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out patch branch
        uses: actions/checkout@v4
        with:
          ref: agent/equipment-live-service-audit
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Apply focused patch
        run: node scripts/audit-equipment-live-service.mjs

      - name: Verify TypeScript and contracts
        run: |
          npm run typecheck -- --pretty false
          npm run test:contracts
          npm run test:smoke

      - name: Commit permanent changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Consolidate Equipment live evidence foundations"
          git push origin HEAD:agent/equipment-live-service-audit
