name: One-time dashboard scope SQL correction

on:
  push:
    branches:
      - agent/set-based-dashboard-scopes
    paths:
      - ".github/workflows/one-time-fix-dashboard-scope-uuid.yml"

permissions:
  contents: write

jobs:
  correct-sql:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/set-based-dashboard-scopes

      - name: Correct UUID aggregation and site resolution
        run: |
          python - <<'PY'
          from pathlib import Path

          migration_path = Path("supabase/migrations/20260720120000_set_based_dashboard_scopes.sql")
          migration = migration_path.read_text()

          uuid_before = """      max(equipment.equipment_id) filter (\n        where equipment.area_rank = 1\n      ) as highest_equipment_id,"""
          uuid_after = """      (array_agg(equipment.equipment_id) filter (\n        where equipment.area_rank = 1\n      ))[1] as highest_equipment_id,"""
          if migration.count(uuid_before) != 1:
              raise SystemExit("Expected one UUID max aggregate to replace")
          migration = migration.replace(uuid_before, uuid_after)

          hardcoded_site = "'11000000-0000-0000-0000-000000000001'::uuid"
          if migration.count(hardcoded_site) != 2:
              raise SystemExit("Expected two hard-coded demo site references")
          migration = migration.replace(hardcoded_site, "public.vorta_current_demo_site_id()")
          migration_path.write_text(migration)

          contract_path = Path("scripts/set-based-dashboard-scope-contracts.mjs")
          contract = contract_path.read_text()
          marker = "assert.match(scopeBody, /row_number\\(\\) over \\(\\[\\s\\S\\]\\*partition by asset\\.area/);"
          addition = """assert.doesNotMatch(\n  scopeBody,\n  /max\\(equipment\\.equipment_id\\)/,\n  \"UUID leaders must not use unsupported max(uuid) aggregation\",\n);\nassert.match(scopeBody, /array_agg\\(equipment\\.equipment_id\\)/);\n"""
          if marker not in contract:
              raise SystemExit("Contract insertion marker not found")
          contract = contract.replace(marker, addition + marker)
          contract_path.write_text(contract)
          PY

      - name: Remove one-time workflow
        run: rm .github/workflows/one-time-fix-dashboard-scope-uuid.yml

      - name: Commit correction
        run: |
          git config user.name "Vorta CI"
          git config user.email "actions@users.noreply.github.com"
          git add supabase/migrations/20260720120000_set_based_dashboard_scopes.sql scripts/set-based-dashboard-scope-contracts.mjs .github/workflows/one-time-fix-dashboard-scope-uuid.yml
          git commit -m "Fix dashboard scope UUID aggregation"
          git push origin HEAD:agent/set-based-dashboard-scopes
