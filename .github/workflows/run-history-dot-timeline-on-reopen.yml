name: Run history dot timeline on reopen

on:
  pull_request_target:
    types: [reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-history-timeline:
    if: github.event.pull_request.title == 'Run history event dot timeline update'
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Run prepared timeline patch
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          from textwrap import dedent

          workflow = Path('.github/workflows/restore-history-event-dot-timeline.yml').read_text()
          marker = "python <<'PY'\n"
          script = workflow.split(marker, 1)[1].split("\n          PY", 1)[0]
          exec(compile(dedent(script), 'history-dot-timeline-patch', 'exec'), {'__name__': '__main__'})
          PY

      - name: Remove temporary workflow files
        run: |
          rm .github/workflows/restore-history-event-dot-timeline.yml
          rm .github/workflows/run-history-dot-timeline-on-reopen.yml

      - name: Commit the History page update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/screens/Equipment/EquipmentHistory.tsx .github/workflows
          git commit -m "Restore work-event dot timeline on equipment history"
          git push origin main

      - name: Close trigger pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr close "${{ github.event.pull_request.number }}" --comment "History event dot timeline update completed."
