name: Apply calibration intelligence redesign

on:
  push:
    branches:
      - main
    paths:
      - .github/calibration-intelligence-trigger

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Write calibration intelligence page
        shell: bash
        env:
          CALIBRATION_PAGE_ZLIB_B64: ""
        run: |
          python - <<'PY2'
          import base64
          import os
          import zlib
          from pathlib import Path

          content = zlib.decompress(
              base64.b64decode(os.environ["CALIBRATION_PAGE_ZLIB_B64"])
          )
          Path("src/screens/Equipment/EquipmentPMs.tsx").write_bytes(content)
          PY2

      - name: Install dependencies
        run: npm install

      - name: Verify production build
        run: npm run build

      - name: Commit calibration intelligence redesign
        shell: bash
        run: |
          rm -f .github/calibration-intelligence-trigger
          rm -f .github/workflows/apply-calibration-intelligence.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/screens/Equipment/EquipmentPMs.tsx .github/calibration-intelligence-trigger .github/workflows/apply-calibration-intelligence.yml
          git commit -m "Redesign equipment calibrations as compliance intelligence"
          git push origin HEAD:main
