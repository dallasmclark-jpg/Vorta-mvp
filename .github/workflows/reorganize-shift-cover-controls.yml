name: Reorganize shift cover controls

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/reorganize-shift-cover-controls.yml

# Trigger the registered one-time workflow.
permissions:
  contents: write

jobs:
  patch-layout:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Reorganize rota map controls
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path("src/screens/LabourRisk/LabourRiskDetailPage.tsx")
          text = path.read_text(encoding="utf-8")

          start_marker = '              {/* Title + legend */}'
          end_marker = '            {selectedView === "month" ?'
          start = text.index(start_marker)
          end = text.index(end_marker, start)

          replacement = '''              {/* Rota controls */}
              <div className="grid gap-5 xl:grid-cols-[minmax(0,1fr)_minmax(520px,auto)] xl:items-start">
                <div className="flex min-w-0 flex-col gap-4">
                  <div className="flex flex-wrap items-center gap-3">
                    <h2 className="text-sm font-semibold text-slate-50">Operational Rota Risk Map</h2>
                    <span className="rounded bg-blue-500/20 px-2 py-0.5 text-[10px] font-bold text-blue-400">
                      7-DAY LOOKAHEAD
                    </span>
                  </div>

                  <div className="flex flex-wrap items-center gap-2">
                    {FILTERS.map((f) => (
                      <button
                        key={f.id}
                        type="button"
                        onClick={() => setActiveFilter(f.id)}
                        className={`rounded-full px-3 py-1 text-xs font-medium transition-colors ${
                          activeFilter === f.id
                            ? "bg-blue-600 text-white"
                            : "bg-white/10 text-slate-400 hover:bg-white/15 hover:text-slate-200"
                        }`}
                      >
                        {f.label}
                      </button>
                    ))}
                  </div>

                  {selectedView === "week" && (
                    <p className="text-xs text-slate-500">
                      💡 Click a shift cell to view cover, skills, gaps and recommended actions.
                    </p>
                  )}
                </div>

                <div className="flex flex-col gap-4 xl:items-end">
                  <div className="flex max-w-full flex-col gap-3 xl:items-end">
                    <div className="flex flex-col gap-2 xl:items-end">
                      <p className="text-[10px] font-bold uppercase tracking-widest text-slate-500">Shift Status</p>
                      <div className="flex flex-wrap gap-2 xl:justify-end">
                        {SHIFT_STATUS_LEGEND.map((item) => (
                          <div key={item.label} className="flex items-center gap-1.5">
                            <span className={`inline-flex h-5 min-w-[92px] items-center justify-center rounded border px-2 text-[10px] font-semibold ${item.color}`}>
                              {item.label}
                            </span>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div className="flex flex-col gap-2 xl:items-end">
                      <p className="text-[10px] font-bold uppercase tracking-widest text-slate-500">Risk Indicators</p>
                      <div className="flex flex-wrap items-center gap-x-3 gap-y-2 xl:justify-end">
                        {RISK_INDICATOR_LEGEND.map((item) => (
                          <div key={item.label} className="flex items-center gap-1.5">
                            <span className={`h-2.5 w-2.5 rounded-full ${item.color}`} />
                            <span className="text-[11px] text-slate-400">{item.label}</span>
                          </div>
                        ))}
                        <div className="flex items-center gap-1.5">
                          <span className="h-2.5 w-2.5 rounded-full border border-blue-400 bg-transparent" />
                          <span className="text-[11px] text-slate-400">Selected Shift</span>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="flex flex-wrap items-center justify-end gap-2">
                    <button
                      type="button"
                      onClick={goToToday}
                      className="rounded border border-white/10 bg-white/10 px-3 py-1 text-xs font-semibold text-slate-50 hover:bg-white/15"
                    >
                      Today
                    </button>
                    <button
                      type="button"
                      onClick={goToPreviousPeriod}
                      className="flex h-7 w-7 items-center justify-center rounded border border-white/10 bg-white/10 text-slate-400 hover:bg-white/15 hover:text-slate-200"
                      aria-label={selectedView === "week" ? "Previous week" : "Previous month"}
                    >
                      ‹
                    </button>
                    <span className="min-w-[150px] text-center text-xs font-semibold text-slate-200">
                      {periodLabel}
                    </span>
                    <button
                      type="button"
                      onClick={goToNextPeriod}
                      className="flex h-7 w-7 items-center justify-center rounded border border-white/10 bg-white/10 text-slate-400 hover:bg-white/15 hover:text-slate-200"
                      aria-label={selectedView === "week" ? "Next week" : "Next month"}
                    >
                      ›
                    </button>
                    <div className="ml-2 flex overflow-hidden rounded border border-white/10">
                      <button
                        type="button"
                        onClick={() => setSelectedView("week")}
                        className={`px-3 py-1 text-xs font-semibold transition-colors ${
                          selectedView === "week"
                            ? "bg-blue-600 text-white"
                            : "bg-white/10 text-slate-400 hover:bg-white/15 hover:text-slate-200"
                        }`}
                      >
                        Week
                      </button>
                      <button
                        type="button"
                        onClick={() => setSelectedView("month")}
                        className={`px-3 py-1 text-xs font-semibold transition-colors ${
                          selectedView === "month"
                            ? "bg-blue-600 text-white"
                            : "bg-white/10 text-slate-400 hover:bg-white/15 hover:text-slate-200"
                        }`}
                      >
                        Month
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>

'''

          text = text[:start] + replacement + text[end:]
          path.write_text(text, encoding="utf-8")
          PY

      - name: Install dependencies
        run: npm install

      - name: Verify build
        run: npm run build

      - name: Commit focused layout change
        shell: bash
        run: |
          rm .github/workflows/reorganize-shift-cover-controls.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/screens/LabourRisk/LabourRiskDetailPage.tsx .github/workflows/reorganize-shift-cover-controls.yml
          git commit -m "Reorganize shift cover map controls"
          git push origin HEAD:main
