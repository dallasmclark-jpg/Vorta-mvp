<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b0e14" />
  <title>Vorta | Maintenance Intelligence</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    (() => {
      const storageKey = "vorta:appearance";
      const valid = new Set(["light", "dark", "system"]);
      let preference = "dark";

      try {
        const stored = localStorage.getItem(storageKey);
        if (valid.has(stored)) preference = stored;
      } catch {
        preference = "dark";
      }

      const resolved = preference === "system"
        ? (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark")
        : preference;
      const colour = resolved === "light" ? "#f8fafc" : "#0b0e14";
      const root = document.documentElement;

      root.classList.add(resolved);
      root.dataset.themePreference = preference;
      root.style.backgroundColor = colour;
      root.style.colorScheme = resolved;

      const themeColour = document.querySelector('meta[name="theme-color"]');
      themeColour?.setAttribute("content", colour);
    })();
  </script>
  <link href="tailwind.css" rel="stylesheet" />
  <link href="/src/theme.css" rel="stylesheet" />
</head>
<body style="margin:0">
<style>
  :root{--vls-bg:#f8fafc;--vls-panel:#fff;--vls-border:#cbd5e1;--vls-mark:#0f172a}
  html.dark{--vls-bg:#0b0e14;--vls-panel:#0d1117;--vls-border:#1a2e4a;--vls-mark:#f8fafc}
  #vls{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--vls-bg);z-index:9999}
  #vls-halo{position:absolute;width:155px;height:155px;border-radius:38px;background:radial-gradient(ellipse at center,rgba(59,130,246,.08) 0%,transparent 70%);pointer-events:none;animation:vls-halo 2.4s ease-in-out infinite}
  @keyframes vls-pulse{0%{stroke-dashoffset:341}100%{stroke-dashoffset:-341}}
  @keyframes vls-halo{0%,100%{opacity:.22}50%{opacity:.42}}
  @media(prefers-reduced-motion:reduce){#vls-track{animation:none!important}#vls-halo{animation:none!important;opacity:.28}}
</style>
<div id="app">
  <div id="vls">
    <div id="vls-halo"></div>
    <svg width="104" height="104" viewBox="0 0 104 104" fill="none" xmlns="http://www.w3.org/2000/svg" style="position:relative;z-index:1">
      <defs>
        <linearGradient id="vls-g" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#60a5fa" stop-opacity="0"/>
          <stop offset="60%" stop-color="#3b82f6" stop-opacity=".9"/>
          <stop offset="100%" stop-color="#93c5fd" stop-opacity="1"/>
        </linearGradient>
      </defs>
      <rect id="vls-panel" x="4" y="4" width="96" height="96" rx="24" ry="24" fill="var(--vls-panel)"/>
      <rect id="vls-border" x="4" y="4" width="96" height="96" rx="24" ry="24" stroke="var(--vls-border)" stroke-width="1.5" fill="none"/>
      <rect id="vls-track" x="4" y="4" width="96" height="96" rx="24" ry="24"
        stroke="url(#vls-g)" stroke-width="2" fill="none" stroke-linecap="round"
        stroke-dasharray="75.02 265.98" stroke-dashoffset="341"
        style="animation:vls-pulse 2s linear infinite;filter:drop-shadow(0 0 4px #3b82f6) drop-shadow(0 0 10px rgba(59,130,246,.5))"/>
      <!-- Official Vorta logomark, scaled to 50×28.2, centred at (52,52) -->
      <svg id="vls-mark" x="27" y="38" width="50" height="28.2" viewBox="0 0 78 44" fill="none">
        <path d="M78 44L48.2658 26.4635C46.7603 25.5598 44 23.8524 44 22H51.0345L78 38.2105V44Z" fill="var(--vls-mark)"/>
        <path d="M78 0L48.2658 17.5365C46.7603 18.4402 44 20.1476 44 22H51.0345L78 5.78947V0Z" fill="var(--vls-mark)"/>
        <path d="M0 44L29.7342 26.4635C31.2397 25.5598 34 23.8524 34 22H26.9655L0 38.2105V44Z" fill="var(--vls-mark)"/>
        <path d="M0 0L29.7342 17.5365C31.2397 18.4402 34 20.1476 34 22H26.9655L0 5.78947V0Z" fill="var(--vls-mark)"/>
      </svg>
    </svg>
  </div>
</div>
<script>
  (() => {
    const recoveryKey = "vorta:stale-build-recovery";
    const recoveryQuery = "vorta_refresh";
    const recoveryWindowMs = 30000;

    const recoverFromStaleBuild = (event) => {
      const now = Date.now();
      const lastAttempt = Number(sessionStorage.getItem(recoveryKey) || "0");

      if (now - lastAttempt < recoveryWindowMs) {
        return;
      }

      event.preventDefault();
      sessionStorage.setItem(recoveryKey, String(now));

      const freshUrl = new URL(window.location.href);
      freshUrl.searchParams.set(recoveryQuery, String(now));
      window.location.replace(freshUrl.toString());
    };

    window.addEventListener("vite:preloadError", recoverFromStaleBuild);

    window.addEventListener("load", () => {
      sessionStorage.removeItem(recoveryKey);

      const cleanUrl = new URL(window.location.href);
      if (cleanUrl.searchParams.has(recoveryQuery)) {
        cleanUrl.searchParams.delete(recoveryQuery);
        window.history.replaceState({}, "", cleanUrl.toString());
      }

      document.documentElement.classList.add("theme-ready");
    });
  })();
</script>
<script type="module" src="./src/index.tsx"></script>
</body>
</html>
