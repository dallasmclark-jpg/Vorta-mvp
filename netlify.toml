[build]
  command = "node scripts/validate-data-mode.mjs && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[context.production.environment]
  # The public Vorta site remains a demonstration deployment.
  VITE_VORTA_DATA_MODE = "demo"

[context.pilot-live.environment]
  # Stable read-only live pilot boundary. This branch must not contain demo fallbacks.
  VITE_VORTA_DATA_MODE = "live"
  VORTA_LIVE_PILOT_APPROVED = "true"

[[headers]]
  for = "/vorta-build.json"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"
